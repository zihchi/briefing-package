<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間計算器</title>
<style>
  /* 基礎佈局與樣式 */
  body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4ece4; color: #4a3627; padding: 20px; }
  .time-calc-section { width: 100%; background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(74,54,39,0.08); }
  h2 { display: flex; justify-content: space-between; align-items: center; margin-top: 0; border-bottom: 2px solid #e7ddd0; padding-bottom: 15px; }
  .app-header-btn { background: none; border: none; cursor: pointer; color: #78716c; transition: color 0.2s; }
  .app-header-btn:hover { color: #8b5a2b; }

  /* 頁籤樣式 */
  .time-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .time-tab-btn { flex: 1; padding: 10px; border: none; background: #f4ece4; border-radius: 10px; cursor: pointer; font-weight: bold; color: #78716c; min-height: 40px; transition: background 0.2s, color 0.2s; }
  .time-tab-btn.active { background: #8b5a2b; color: #ffffff; }
  .time-tab-content { display: none; }
  .time-tab-content.active { display: block; }

  /* 卡片與內容區塊 */
  .app-card { background: #faf6f0; border: 1px solid #e7ddd0; border-radius: 16px; padding: 15px; margin-bottom: 15px; }
  .app-label { font-size: 0.9em; font-weight: bold; color: #78716c; }
  .app-time-input { display: flex; align-items: center; gap: 5px; }

  /* 🌟 優化：針對 iOS 絲滑輸入框的專屬樣式 🌟 */
  .app-time-input input[inputmode="numeric"] {
    width: 50px;
    padding: 8px;
    border: 1px solid #e7ddd0;
    border-radius: 10px;
    text-align: center;
    font-size: 1.1em;
    color: #4a3627;
    background: #ffffff;
    min-height: 38px;
    box-sizing: border-box;
    font-family: monospace; /* 等寬字體讓數字視覺更穩定 */
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .app-time-input input[inputmode="numeric"]:focus {
    border-color: #8b5a2b;
    outline: none;
    box-shadow: 0 0 0 2px rgba(139,90,43,0.2);
  }
  #addDays { width: 60px !important; } /* 天數可以寬一點 */

  .app-date-input { padding: 8px; border: 1px solid #e7ddd0; border-radius: 10px; text-align: center; font-size: 1em; color: #4a3627; background: #ffffff; min-height: 38px; box-sizing: border-box; }

  /* 切換開關 */
  .app-toggle { position: relative; display: flex; background: #f4ece4; border-radius: 999px; overflow: hidden; padding: 2px; }
  .app-toggle-btn { flex: 1; border: none; background: transparent; padding: 8px; z-index: 2; position: relative; cursor: pointer; font-weight: bold; color: #78716c; min-height: 36px; transition: color 0.3s;}
  .app-toggle-btn.active { color: #ffffff; }
  .app-toggle-pill { position: absolute; top: 2px; bottom: 2px; left: 2px; width: calc(50% - 2px); background: #8b5a2b; border-radius: 999px; z-index: 1; transition: transform 0.3s ease; }

  /* 按鈕與結果顯示 */
  button[onclick^="calc"] { background: #8b5a2b; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; min-height: 44px; transition: background 0.2s; }
  button[onclick^="calc"]:hover { background: #7a4e23; }
  .app-time-display { font-size: 1.5em; font-weight: bold; color: #8b5a2b; }

  /* 純時間加減：計算機鍵盤 */
  .calc-keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .calc-key { padding: 14px 0; font-size: 1.3em; font-weight: bold; border: none; border-radius: 12px; background: #faf6f0; color: #4a3627; cursor: pointer; min-height: 56px; box-shadow: 0 1px 2px rgba(74,54,39,0.08); transition: filter .12s; font-family: monospace; }
  .calc-key:active { filter: brightness(0.9); }
  .calc-key.calc-op { background: #e7ddd0; color: #8b5a2b; }
  .calc-key.calc-eq { background: #8b5a2b; color: #fff; }
  .calc-key.calc-clear { background: #f3d9d4; color: #b91c1c; }
  .calc-key.calc-back { background: #efe6da; }
  .now-btn { background: #efe6da; color: #8b5a2b; border: 1px solid #e7ddd0; border-radius: 8px; padding: 6px 10px; font-size: 0.8em; font-weight: bold; cursor: pointer; min-height: 32px; }
  .now-btn:active { filter: brightness(0.92); }

  /* 響應式：iPhone 直式避免水平溢出 */
  @media (max-width: 480px) {
    body { padding: 12px; }
    .time-calc-section { padding: 16px; border-radius: 16px; }
    .time-tabs { gap: 6px; }
    .time-tab-btn { padding: 10px 6px; font-size: 0.9em; }
    .app-time-display { font-size: 1.3em; }
  }
</style>
</head>
<body>

  <div class="section time-calc-section" id="timeCalcBox">
    <h2>
      <div>⏱️ 時間計算器</div>
      <button id="resetTimeCalcBtn" class="app-header-btn" title="重設所有數值" onclick="resetAll()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </h2>
    
    <div class="app-wrapper">
      
      <div class="time-tabs">
        <button class="time-tab-btn active" data-tab="tab-simple" onclick="switchTimeTab('tab-simple')">純時間加減</button>
        <button class="time-tab-btn" data-tab="tab-diff" onclick="switchTimeTab('tab-diff')">時間差計算</button>
        <button class="time-tab-btn" data-tab="tab-addsub" onclick="switchTimeTab('tab-addsub')">時間推算</button>
      </div>

      <!-- 功能一：純時間加減（計算機式，可連續運算） -->
      <div id="tab-simple" class="time-tab-content active">
        <div class="app-card" style="padding: 16px;">
          <div id="calcTape" style="min-height: 20px; text-align: right; color: #a8a29e; font-size: 0.95em; font-family: monospace; word-break: break-all;">&nbsp;</div>
          <div id="calcDisplay" style="text-align: right; font-size: 2.4em; font-weight: bold; color: #8b5a2b; font-family: monospace; line-height: 1.2;">0:00</div>
          <div style="text-align: right; color: #a8a29e; font-size: 0.78em; margin-top: 2px;">輸入 4 碼 HH:MM（後兩碼為分）· 可連續 ＋／－</div>
        </div>
        <div class="calc-keypad">
          <button class="calc-key" onclick="calcDigit('7')">7</button>
          <button class="calc-key" onclick="calcDigit('8')">8</button>
          <button class="calc-key" onclick="calcDigit('9')">9</button>
          <button class="calc-key calc-back" onclick="calcBack()">⌫</button>
          <button class="calc-key" onclick="calcDigit('4')">4</button>
          <button class="calc-key" onclick="calcDigit('5')">5</button>
          <button class="calc-key" onclick="calcDigit('6')">6</button>
          <button class="calc-key calc-op" onclick="calcOp('-')">−</button>
          <button class="calc-key" onclick="calcDigit('1')">1</button>
          <button class="calc-key" onclick="calcDigit('2')">2</button>
          <button class="calc-key" onclick="calcDigit('3')">3</button>
          <button class="calc-key calc-op" onclick="calcOp('+')">＋</button>
          <button class="calc-key calc-clear" onclick="calcClear()">C</button>
          <button class="calc-key" onclick="calcDigit('0')">0</button>
          <button class="calc-key" onclick="calcDigit('00')">00</button>
          <button class="calc-key calc-eq" onclick="calcOp('=')">＝</button>
        </div>
      </div>

      <!-- 功能二：計算時間差 -->
      <div id="tab-diff" class="time-tab-content">
        <div class="app-grid" style="display: flex; gap: 15px; margin-bottom: 1.5em; flex-wrap: wrap;">
          <div class="app-card" style="flex: 1; margin-bottom: 0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <span class="app-label">🛫 起始時間</span>
              <button type="button" class="now-btn" onclick="fillNow('diffStartDate','diffStartHour','diffStartMin')">現在</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <input type="date" id="diffStartDate" class="app-date-input" style="width: 100%; box-sizing: border-box;">
              <div class="app-time-input" style="justify-content: center;">
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="diffStartHour" class="auto-next" data-next="diffStartMin" placeholder="00" onfocus="this.select()">
                <span>:</span>
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="diffStartMin" class="auto-next" data-next="diffEndHour" placeholder="00" onfocus="this.select()">
              </div>
            </div>
          </div>
          
          <div class="app-card" style="flex: 1; margin-bottom: 0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <span class="app-label">🛬 結束時間</span>
              <button type="button" class="now-btn" onclick="fillNow('diffEndDate','diffEndHour','diffEndMin')">現在</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <input type="date" id="diffEndDate" class="app-date-input" style="width: 100%; box-sizing: border-box;">
              <div class="app-time-input" style="justify-content: center;">
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="diffEndHour" class="auto-next" data-next="diffEndMin" placeholder="00" onfocus="this.select()">
                <span>:</span>
                <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="diffEndMin" class="auto-next" placeholder="00" onfocus="this.select()">
              </div>
            </div>
          </div>
        </div>

        <div style="text-align:center;margin-bottom:10px;">
          <button type="button" class="now-btn" onclick="swapDiff()">⇅ 對調起訖</button>
        </div>
        <button onclick="calculateTimeDiff()" style="width: 100%; padding: 1em; font-size: 1.1em; margin-bottom: 15px;">計算時間差</button>

        <div id="diffResultBox" class="app-card" style="display: none; text-align: center; border: 2px solid #8b5a2b; background: rgba(139,90,43,0.06);">
          <div id="diffResultText" class="app-time-display"></div>
          <div id="diffResultDetail" style="color: #78716c; margin-top: 10px; font-weight: bold;"></div>
        </div>
      </div>

      <!-- 功能三：時間推算 -->
      <div id="tab-addsub" class="time-tab-content">
        <div class="app-card">
          <div style="display: flex; flex-wrap: wrap; gap: 20px; align-items: center; border-bottom: 1px dashed #e7ddd0; padding-bottom: 15px; margin-bottom: 15px;">
            <div class="app-label" style="min-width: 80px; margin: 0;">📍 基準</div>
            <button type="button" class="now-btn" onclick="fillNow('baseDate','baseHour','baseMin')">現在</button>
            <input type="date" id="baseDate" class="app-date-input">
            <div class="app-time-input">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="baseHour" class="auto-next" data-next="baseMin" placeholder="00" onfocus="this.select()">
              <span>:</span>
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="baseMin" class="auto-next" data-next="addDays" placeholder="00" onfocus="this.select()">
            </div>
          </div>

          <div style="display: flex; flex-wrap: wrap; gap: 20px; align-items: center;">
            <div class="app-label" style="min-width: 80px; margin: 0;">⚙️ 推算</div>
            
            <div class="app-toggle" style="margin: 0; width: 140px;">
              <button class="app-toggle-btn active" id="btnBaseAdd" onclick="setBaseOp('add')">往後推</button>
              <button class="app-toggle-btn" id="btnBaseSub" onclick="setBaseOp('sub')">往前推</button>
              <div id="baseOpPill" class="app-toggle-pill" style="transform: translateX(0);"></div>
            </div>
            <input type="hidden" id="operationType" value="add">

            <div class="app-time-input">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="addDays" class="auto-next" data-next="addHours" placeholder="0" onfocus="this.select()">
              <span style="color:#78716c;">天</span>
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="addHours" class="auto-next" data-next="addMins" placeholder="00" onfocus="this.select()">
              <span style="color:#78716c;">時</span>
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="addMins" class="auto-next" placeholder="00" onfocus="this.select()">
              <span style="color:#78716c;">分</span>
            </div>
          </div>
        </div>

        <button onclick="calculateAddSub()" style="width: 100%; padding: 1em; font-size: 1.1em; margin-bottom: 15px;">開始推算</button>

        <div id="addsubResultBox" class="app-card" style="display: none; text-align: center; border: 2px solid #8b5a2b; background: rgba(139,90,43,0.06);">
          <div id="addsubResultText" class="app-time-display" style="font-size: 1.8em;"></div>
          <!-- 🎉 更新：已將星期幾的顯示區域隱藏 -->
          <div id="addsubResultDetail" style="display: none; color: #78716c; margin-top: 10px; font-weight: bold;"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- 系統初始化 ---
    document.addEventListener("DOMContentLoaded", () => {
      setTodayDates();
      initAutoNextLogic(); // 啟動絲滑輸入邏輯
    });

    function setTodayDates() {
      const today = new Date().toISOString().split('T')[0];
      ['diffStartDate', 'diffEndDate', 'baseDate'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.value = today;
      });
    }

    // 🌟 核心靈魂：自動跳格與補零邏輯 🌟
    function initAutoNextLogic() {
      const autoNextInputs = document.querySelectorAll('.auto-next');
      
      autoNextInputs.forEach(input => {
        // 監聽輸入事件
        input.addEventListener('input', function() {
          // 強制剔除非數字字元 (防呆)
          this.value = this.value.replace(/[^0-9]/g, '');
          
          // 若長度達到最大值，自動跳轉下一個欄位
          if (this.value.length >= this.maxLength) {
            const nextTargetId = this.getAttribute('data-next');
            if (nextTargetId) {
              const nextElement = document.getElementById(nextTargetId);
              if (nextElement) nextElement.focus();
            } else {
              this.blur(); // 沒下一個欄位就自動收起鍵盤
            }
          }
        });

        // 離開焦點時自動補零 
        // 注意：不對 maxlength > 2 的欄位 (如5位數小時或天數) 強制補首零
        input.addEventListener('blur', function() {
          if (this.value.length === 1 && this.maxLength === 2) {
            this.value = '0' + this.value;
          }
        });
      });
    }

    // --- 標籤切換邏輯 ---
    function switchTimeTab(tabId) {
      document.querySelectorAll('.time-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.time-tab-content').forEach(content => content.classList.remove('active'));
      
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    // --- 功能一：HH:MM 計算機（可連續加減） ---
    let calcAcc = null, calcEntry = '', calcOpv = null, calcTape = '', calcJustEval = false;
    const calcEntryMins = () => {
      if(!calcEntry) return 0;
      const mm = parseInt(calcEntry.slice(-2) || '0', 10);
      const hh = parseInt(calcEntry.slice(0, -2) || '0', 10);
      return hh * 60 + mm;
    };
    const calcFmt = (mins) => { const neg = mins < 0; mins = Math.abs(mins); return (neg ? '-' : '') + Math.floor(mins/60) + ':' + String(mins % 60).padStart(2, '0'); };
    function calcRender() {
      const disp = document.getElementById('calcDisplay');
      disp.textContent = calcEntry !== '' ? calcFmt(calcEntryMins()) : calcFmt(calcAcc || 0);
      document.getElementById('calcTape').innerHTML = (calcTape + (calcEntry !== '' ? calcFmt(calcEntryMins()) : '')) || '&nbsp;';
    }
    function calcDigit(d) {
      if(calcJustEval) { calcAcc = null; calcOpv = null; calcTape = ''; calcJustEval = false; }
      calcEntry = (calcEntry + d).replace(/\D/g, '').slice(-4);
      calcRender();
    }
    function calcBack() { calcEntry = calcEntry.slice(0, -1); calcRender(); }
    function calcOp(sym) {
      if(calcEntry !== '') {
        const v = calcEntryMins();
        calcAcc = (calcOpv === null) ? v : (calcOpv === '+' ? calcAcc + v : calcAcc - v);
        calcTape += calcFmt(v);
        calcEntry = '';
      } else if(calcAcc === null) { calcAcc = 0; }
      if(sym === '=') { calcTape += ' ='; calcOpv = null; calcJustEval = true; }
      else { calcTape += ' ' + (sym === '+' ? '＋' : '−') + ' '; calcOpv = sym; calcJustEval = false; }
      calcRender();
    }
    function calcClear() { calcAcc = null; calcEntry = ''; calcOpv = null; calcTape = ''; calcJustEval = false; calcRender(); }

    // --- 快速填入「現在」(當地) 與起訖對調 ---
    function fillNow(dateId, hId, mId) {
      const n = new Date();
      const p = (x) => String(x).padStart(2, '0');
      document.getElementById(dateId).value = `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}`;
      document.getElementById(hId).value = p(n.getHours());
      document.getElementById(mId).value = p(n.getMinutes());
    }
    function swapDiff() {
      const ids = [['diffStartDate','diffEndDate'], ['diffStartHour','diffEndHour'], ['diffStartMin','diffEndMin']];
      ids.forEach(([a, b]) => { const ea = document.getElementById(a), eb = document.getElementById(b); const t = ea.value; ea.value = eb.value; eb.value = t; });
    }

    // --- 切換開關邏輯 ---
    function setBaseOp(op) {
      document.getElementById('operationType').value = op;
      document.getElementById('btnBaseAdd').classList.toggle('active', op === 'add');
      document.getElementById('btnBaseSub').classList.toggle('active', op === 'sub');
      document.getElementById('baseOpPill').style.transform = op === 'add' ? 'translateX(0)' : 'translateX(100%)';
    }

    // --- 功能二：計算時間差 ---
    function calculateTimeDiff() {
      const d1 = document.getElementById('diffStartDate').value;
      const h1 = String(document.getElementById('diffStartHour').value || '00').padStart(2, '0');
      const m1 = String(document.getElementById('diffStartMin').value || '00').padStart(2, '0');
      
      const d2 = document.getElementById('diffEndDate').value;
      const h2 = String(document.getElementById('diffEndHour').value || '00').padStart(2, '0');
      const m2 = String(document.getElementById('diffEndMin').value || '00').padStart(2, '0');

      if (!d1 || !d2) {
        // 🎉 更新：不使用 alert()，改為直接於結果區顯示錯誤訊息
        document.getElementById('diffResultText').innerText = "⚠️ 請選擇完整的日期！";
        document.getElementById('diffResultDetail').innerText = "";
        document.getElementById('diffResultBox').style.display = 'block';
        return;
      }

      const date1 = new Date(`${d1}T${h1}:${m1}:00`);
      const date2 = new Date(`${d2}T${h2}:${m2}:00`);
      
      let diffMs = date2 - date1;
      const isPast = diffMs < 0;
      diffMs = Math.abs(diffMs);

      const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((diffMs / 1000 / 60) % 60);

      const prefix = isPast ? "相差 (起點大於終點): " : "相差: ";
      let timeString = [];
      if (days > 0) timeString.push(`${days} 天`);
      if (hours > 0) timeString.push(`${hours} 小時`);
      if (mins > 0 || timeString.length === 0) timeString.push(`${mins} 分鐘`);

      document.getElementById('diffResultText').innerText = prefix + timeString.join(' ');
      
      const totalHours = (diffMs / (1000 * 60 * 60)).toFixed(1);
      document.getElementById('diffResultDetail').innerText = `約合 ${totalHours} 小時`;
      document.getElementById('diffResultBox').style.display = 'block';
    }

    // --- 功能三：時間推算 ---
    function calculateAddSub() {
      const bDate = document.getElementById('baseDate').value;
      const bHour = String(document.getElementById('baseHour').value || '00').padStart(2, '0');
      const bMin = String(document.getElementById('baseMin').value || '00').padStart(2, '0');
      
      const addD = parseInt(document.getElementById('addDays').value) || 0;
      const addH = parseInt(document.getElementById('addHours').value) || 0;
      const addM = parseInt(document.getElementById('addMins').value) || 0;
      const op = document.getElementById('operationType').value;

      if (!bDate) {
        // 🎉 更新：不使用 alert()，改為直接於結果區顯示錯誤訊息
        document.getElementById('addsubResultText').innerText = "⚠️ 請選擇基準日期！";
        document.getElementById('addsubResultBox').style.display = 'block';
        return;
      }

      const base = new Date(`${bDate}T${bHour}:${bMin}:00`);
      const totalMsToAdd = (addD * 24 * 60 * 60 * 1000) + (addH * 60 * 60 * 1000) + (addM * 60 * 1000);

      const newDate = new Date(op === 'add' ? base.getTime() + totalMsToAdd : base.getTime() - totalMsToAdd);
      
      const yyyy = newDate.getFullYear();
      const mm = String(newDate.getMonth() + 1).padStart(2, '0');
      const dd = String(newDate.getDate()).padStart(2, '0');
      const hh = String(newDate.getHours()).padStart(2, '0');
      const min = String(newDate.getMinutes()).padStart(2, '0');
      
      // 🎉 更新：已移除星期幾 (daysOfWeek) 推算邏輯

      document.getElementById('addsubResultText').innerText = `${yyyy}-${mm}-${dd} ${hh}:${min}`;
      // 🎉 更新：不再寫入星期資訊，並確保它是乾淨的
      document.getElementById('addsubResultDetail').innerText = ""; 
      document.getElementById('addsubResultBox').style.display = 'block';
    }

    // --- 重設所有功能 ---
    function resetAll() {
      // 清空文字輸入框
      document.querySelectorAll('input[inputmode="numeric"]').forEach(input => input.value = '');
      setTodayDates();
      document.querySelectorAll('[id$="ResultBox"]').forEach(box => box.style.display = 'none');
      calcClear();
      setBaseOp('add');
    }
  </script>
</body>
</html>
