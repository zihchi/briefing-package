<style>
    /* 優化地圖的響應式高度：在手機上固定高度，桌機上依螢幕自動調整 */
    #notam-map { 
        height: 50vh; 
        min-height: 400px; 
    }
    @media (min-width: 1024px) {
        #notam-map { 
            height: calc(100vh - 160px); 
        }
    }
    
    .leaflet-popup-content { 
        font-family: 'Monaco', 'Consolas', monospace; 
        font-size: 13px; 
        line-height: 1.6; 
    }
</style>

<div class="max-w-7xl mx-auto px-4 py-6">
    <header class="mb-6 flex justify-between items-end border-b-2 border-blue-600 pb-4">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">NOTAM Radar</h1>
            <p class="text-slate-500 mt-1 font-medium">NOTAM 視覺化 <span class="text-blue-500 text-xs ml-2 px-2 py-0.5 bg-blue-50 rounded-full border border-blue-100">雙引擎防護版</span></p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
        <div class="lg:col-span-4 space-y-4">
            <!-- 輸入區塊 -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 transition-all hover:shadow-md h-full flex flex-col">
                <label class="block text-sm font-bold mb-3 text-slate-700 flex items-center">
                    <svg class="w-4 h-4 mr-2 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"></path><path fill-rule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd"></path></svg>
                    貼入 NOTAM / AIP 原始文本
                </label>
                <textarea id="notamInput" 
                    class="w-full flex-grow min-h-[300px] p-4 text-sm font-mono border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none bg-slate-50 transition-all text-slate-700 placeholder-slate-400"
                    placeholder="例如: &#10;A1234/24 NOTAMN&#10;Q) RJJJ/QWLW/IV/M/W/000/040/&#10;B) 2412250100 C) 2412250400&#10;E) ACFT ACROBATIC FLT AREA:&#10;351234N 1394567E ..."></textarea>
                
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button id="btn-process-notam" class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 shadow-md shadow-blue-200 flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        座標掃描
                    </button>
                    <button id="btn-clear-notam" class="bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all duration-200">
                        清空重置
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 relative flex flex-col">
            <!-- 地圖容器 -->
            <div id="notam-map" class="rounded-2xl shadow-sm border-2 border-slate-200 overflow-hidden z-10 transition-all hover:border-blue-300 flex-grow"></div>
            
            <!-- 懸浮圖例 (Legend) -->
            <div class="absolute top-4 right-4 z-[1000] space-y-2 pointer-events-none">
                <div class="bg-white/80 backdrop-blur-md p-3.5 rounded-xl shadow-lg border border-white/50 text-[11px] text-slate-700 font-medium tracking-wide">
                    <div class="flex items-center mb-2"><span class="w-3 h-3 bg-blue-500 rounded-full mr-2.5 shadow-sm"></span>多邊形區域 (Polygon)</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-emerald-500 rounded-full mr-2.5 shadow-sm"></span>半徑範圍 (Radius)</div>
                </div>
            </div>
        </div>
    </div>
</div>
