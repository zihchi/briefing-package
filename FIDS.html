<style>
   /* 針對嵌入首頁後的控制面板微調 */
    .fids-control-panel {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;

    /* 日期按鈕樣式 */
    .fids-date-btn { background: transparent !important; border-color: #cbd5e1 !important; color: #64748b !important; }

    /* 過濾標籤基礎樣式 (移除 HTML 內的強制白底，改由這裡控制) */
    .fids-filter-label { background: #ffffff; border-color: #e2e8f0; color: #475569; }

    /* 航空公司過濾標籤狀態 (選中時變色) */
    input[name="fids-airline"][value="JX"]:checked + .fids-filter-label { background: #fef08a !important; border-color: #eab308 !important; color: #854d0e !important; }
    input[name="fids-airline"][value="CI"]:checked + .fids-filter-label { background: #fecaca !important; border-color: #f43f5e !important; color: #9f1239 !important; }
    input[name="fids-airline"][value="BR"]:checked + .fids-filter-label { background: #bbf7d0 !important; border-color: #22c55e !important; color: #166534 !important; }
    input[name="fids-airline"][value="ALL"]:checked + .fids-filter-label { background: #e2e8f0 !important; border-color: #64748b !important; color: #334155 !important; }

    /* 時段過濾標籤狀態 (選中時變色) */
    input[name="fids-time"]:checked + .fids-filter-label { background: #dbeafe !important; border-color: #3b82f6 !important; color: #1e3a8a !important; }

    /* 🎯 立即更新按鈕 (完全同步 index.html 重新整理風格) */
    .fids-btn-refresh {
        background: transparent !important;
        border: 2px solid #3c79ff !important;
        border-radius: 6px !important;
        padding: 4px 12px !important;
        font-size: 0.9em !important;
        color: #3c79ff !important;
        font-weight: bold !important;
        cursor: pointer !important;
        transition: background-color 0.2s, color 0.2s, transform 0.1s !important;
        display: inline-flex !important;
        align-items: center !important;
        gap: 6px !important;
        margin: 0 !important;
    }
    .fids-btn-refresh:hover { background-color: rgba(60,121,255,0.1) !important; color: #2c5edc !important; }
    .fids-btn-refresh:active { transform: scale(0.95) !important; }
    .fids-btn-refresh:disabled { border-color: #94a3b8 !important; color: #94a3b8 !important; cursor: not-allowed; transform: none !important; }

    /* 🎯 極簡高密度清單樣式 */
    .fids-list-row { transition: background-color 0.15s ease-in-out; }
    .fids-list-row:hover { background-color: #f8fafc; }
    .fids-list-row:active { background-color: #f1f5f9; }

    /* 狀態標示與動畫 */
    .fids-status-tag { font-size: 0.65rem; font-weight: 800; padding: 1px 4px; border-radius: 4px; background: #f1f5f9; color: #64748b; margin-left: 6px; border: 1px solid #e2e8f0; white-space: nowrap;}
    @keyframes fids-spin { 100% { transform: rotate(360deg); } }
    .fids-animate-spin-fast { animation: fids-spin 0.8s linear infinite; display: inline-block;}
</style>

<script>
// ==========================================
// ✈️ 戰術儀表板核心邏輯 (隔離全域變數版)
// ==========================================
const FIDS_GAS_URL = "https://script.google.com/macros/s/AKfycbwYjb1a6RHfXjNF7cmN2RBKJTLb_2Fsk-OtaHjOmHE-LEXeFVz1GDS47hejgp6XTK3Z/exec"; 

let fidsFlightData = { departures: [], arrivals: [] };
let fidsState = {
    mode: 'D',
    date: 'today',
    airline: 'JX',    
    time: 'NOW2'      
};
const fidsAllowedAirlines = ['JX', 'CI', 'BR'];

// 用來儲存動態抓取的 DOM 元素
let fidsUI = {};

// ✅ 這是給 app.js 呼叫的專屬喚醒函數
function initFIDS() {
    console.log("✈️ FIDS 戰術看板系統已喚醒");

    // 必須在這裡抓取 DOM，確保抓到的是最新嵌入首頁的 HTML 元素
    fidsUI = {
        list: document.getElementById('fids-flight-list'),
        loading: document.getElementById('fids-msg-loading'),
        empty: document.getElementById('fids-msg-empty'),
        emptyDiag: document.getElementById('fids-empty-diag'),
        error: document.getElementById('fids-msg-error'),
        errorText: document.getElementById('fids-error-text'),
        btnRefresh: document.getElementById('fids-btn-refresh'),
        iconRefresh: document.getElementById('fids-icon-refresh'),
        modeBtns: document.querySelectorAll('.fids-mode-btn'),
        dateBtns: document.querySelectorAll('.fids-date-btn'),
        airlineRadios: document.querySelectorAll('input[name="fids-airline"]'),
        timeRadios: document.querySelectorAll('input[name="fids-time"]'),
        thTime: document.getElementById('fids-th-time'),
        thBelt: document.getElementById('fids-th-belt'),
        thDesk: document.getElementById('fids-th-desk')
    };

    // 重新綁定事件
    fidsUI.modeBtns.forEach(btn => {
        btn.onclick = (e) => {
            fidsUI.modeBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            fidsState.mode = e.target.dataset.mode;
            
            fidsUI.thBelt.innerText = fidsState.mode === 'D' ? '狀態 Stat' : '轉盤 Belt';
            fidsUI.thDesk.innerText = fidsState.mode === 'D' ? '航廈 / 櫃檯 Desk' : '航廈 Term';
            renderFIDS();
        };
    });

    fidsUI.dateBtns.forEach(btn => {
        btn.onclick = (e) => {
            fidsUI.dateBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            if (e.target.id === 'fids-btn-yesterday') fidsState.date = 'yesterday';
            else if (e.target.id === 'fids-btn-today') fidsState.date = 'today';
            else if (e.target.id === 'fids-btn-tomorrow') fidsState.date = 'tomorrow';
            else if (e.target.id === 'fids-btn-alldate') fidsState.date = 'all';
            renderFIDS();
        };
    });

    fidsUI.airlineRadios.forEach(radio => {
        radio.onchange = (e) => {
            fidsState.airline = e.target.value;
            renderFIDS();
        };
    });

    fidsUI.timeRadios.forEach(radio => {
        radio.onchange = (e) => {
            fidsState.time = e.target.value;
            renderFIDS();
        };
    });

    fidsUI.btnRefresh.onclick = fetchFIDSData;
    
    // 啟動時自動抓取資料
    fetchFIDSData();
}

async function fetchFIDSData() {
    fidsUI.list.innerHTML = '';
    fidsUI.error.classList.add('hidden');
    fidsUI.empty.classList.add('hidden');
    fidsUI.loading.classList.remove('hidden');
    
    fidsUI.btnRefresh.disabled = true;
    fidsUI.iconRefresh.classList.add('fids-animate-spin-fast');

    try {
        const response = await fetch(FIDS_GAS_URL);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        
        const data = await response.json();
        if (data.error) throw new Error(data.detail || "GAS 內部處理錯誤");

        fidsFlightData.departures = Array.isArray(data.departures) ? data.departures : [];
        fidsFlightData.arrivals = Array.isArray(data.arrivals) ? data.arrivals : [];
        
        renderFIDS();

    } catch (err) {
        console.error("Data Link Error:", err);
        fidsUI.loading.classList.add('hidden');
        fidsUI.error.classList.remove('hidden');
        fidsUI.errorText.innerHTML = `<div class="font-bold">資料鏈路異常</div><div class="text-sm mt-1">${err.message}</div>`;
    } finally {
        fidsUI.iconRefresh.classList.remove('fids-animate-spin-fast');
        setTimeout(() => { fidsUI.btnRefresh.disabled = false; }, 5000);
    }
}

function getTaiwanDateString(offsetDays = 0) {
    const d = new Date();
    d.setDate(d.getDate() + offsetDays); 

    const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Taipei',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    }).formatToParts(d);
    
    const year = parts.find(p => p.type === 'year').value;
    const month = parts.find(p => p.type === 'month').value;
    const day = parts.find(p => p.type === 'day').value;
    
    return `${year}-${month}-${day}`;
}

function renderFIDS() {
    fidsUI.loading.classList.add('hidden');
    
    const targetArray = fidsState.mode === 'D' ? fidsFlightData.departures : fidsFlightData.arrivals;
    
    let targetDateStr = '';
    if (fidsState.date === 'yesterday') targetDateStr = getTaiwanDateString(-1);
    else if (fidsState.date === 'today') targetDateStr = getTaiwanDateString(0);
    else if (fidsState.date === 'tomorrow') targetDateStr = getTaiwanDateString(1);

    if (!Array.isArray(targetArray)) {
        fidsUI.list.innerHTML = '';
        fidsUI.empty.classList.remove('hidden');
        return;
    }

    const processedData = targetArray.map(f => {
        let rawTime = fidsState.mode === 'D' ? f.ScheduleDepartureTime : f.ScheduleArrivalTime;
        if (!rawTime) {
            rawTime = fidsState.mode === 'D' ? f.EstimatedDepartureTime : f.EstimatedArrivalTime;
        }
        
        let flightDateStr = f.FlightDate || "";
        let flightHour = -1;
        let flightTimeMs = 0;
        
        if (rawTime) {
            flightDateStr = rawTime.split('T')[0];
            const timePart = rawTime.split('T')[1];
            if (timePart) flightHour = parseInt(timePart.split(':')[0], 10);
            
            let isoStr = rawTime;
            if(!isoStr.includes('+') && !isoStr.includes('Z')) isoStr += "+08:00";
            flightTimeMs = new Date(isoStr).getTime();
        }
        
        return {
             ...f,
             _rawTime: rawTime,
             _dateStr: flightDateStr,
             _hour: flightHour,
             _timeMs: flightTimeMs
        };
    });

    const filteredData = processedData.filter(f => {
        if (!fidsAllowedAirlines.includes(f.AirlineID)) return false;
        if (fidsState.airline !== 'ALL' && f.AirlineID !== fidsState.airline) return false;

        let passDate = true;
        if (fidsState.date !== 'all') {
            passDate = (f._dateStr === targetDateStr);
        }

        let passTime = true;
        if (fidsState.time === 'NOW2') {
            const nowMs = Date.now();
            const windowMs = 2.5 * 60 * 60 * 1000; 
            if (f._timeMs > 0) {
                if (f._timeMs >= nowMs - windowMs && f._timeMs <= nowMs + windowMs) {
                    passDate = true;
                } else {
                    passTime = false;
                }
            } else {
                 passTime = false; 
            }
        } else if (fidsState.time !== 'ALL') {
             if (fidsState.time === '00-06' && !(f._hour >= 0 && f._hour < 6)) passTime = false;
             if (fidsState.time === '06-12' && !(f._hour >= 6 && f._hour < 12)) passTime = false;
             if (fidsState.time === '12-18' && !(f._hour >= 12 && f._hour < 18)) passTime = false;
             if (fidsState.time === '18-24' && !(f._hour >= 18 && f._hour < 24)) passTime = false;
        }

        return passDate && passTime;
    });

    filteredData.sort((a, b) => a._timeMs - b._timeMs);

    if (filteredData.length === 0) {
        fidsUI.list.innerHTML = '';
        if (targetArray.length > 0) {
            const firstDate = processedData[0]?._dateStr || '未知';
            const lastDate = processedData[processedData.length - 1]?._dateStr || '未知';
            fidsUI.emptyDiag.innerHTML = `
                <div class="text-sm text-slate-500 mt-2">雷達掃描 ${targetArray.length} 架次，但皆不符合目前設定。</div>
                <div class="text-xs text-left bg-slate-50 p-4 rounded-lg border border-slate-200 mt-4 text-slate-600">
                    <b class="text-blue-700">🔧 航管診斷資訊</b><br>
                    儀表板尋找日期：${fidsState.date === 'all' ? '全部日期' : targetDateStr}<br>
                    塔台回傳資料區間：${firstDate} 至 ${lastDate}<br>
                </div>
            `;
        } else {
            fidsUI.emptyDiag.innerHTML = `<div class="text-sm text-slate-500 mt-2">塔台目前未回傳任何航班資訊。</div>`;
        }
        fidsUI.empty.classList.remove('hidden');
        return;
    }

    fidsUI.empty.classList.add('hidden');

    const blocksHTML = filteredData.map(f => {
        const flightNo = f.AirlineID + f.FlightNumber;
        const iataCode = fidsState.mode === 'D' ? f.ArrivalAirportID : f.DepartureAirportID;
        const timeStr = f._rawTime ? f._rawTime.substring(11, 16) : '—';
        const terminal = f.Terminal ? `T${f.Terminal}` : '—';
        const gate = f.Gate || '—';
        const desk = f.CheckCounter || '—';
        const belt = f.BaggageClaim || '—';
        
        let statusRemark = fidsState.mode === 'D' ? (f.DepartureRemark || '') : (f.ArrivalRemark || '');
        const beltValue = fidsState.mode === 'D' ? (statusRemark || '—') : belt;

        let airlineColorClass = 'text-slate-800';
        if (f.AirlineID === 'JX') airlineColorClass = 'text-[#A67C00]';
        else if (f.AirlineID === 'CI') airlineColorClass = 'text-[#C0392B]';
        else if (f.AirlineID === 'BR') airlineColorClass = 'text-[#0F7A4D]';

        return `
            <div class="fids-list-row flex items-center px-6 py-3 border-b border-slate-100">
                <div class="w-[18%] flex items-center">
                    <span class="font-bold text-[1.15rem] tracking-wide ${airlineColorClass}">${flightNo}</span>
                </div>
                <div class="w-[18%] flex items-center pr-2">
                    <span class="font-bold text-slate-700 text-[1.15rem] tracking-wider">${iataCode}</span>
                </div>
                <div class="w-[12%] flex justify-center items-center">
                    <span class="font-black text-red-600 text-[1.25rem]">${gate}</span>
                </div>
                <div class="w-[16%] flex justify-center items-center">
                    <span class="font-mono font-bold text-teal-700 text-[1.2rem]">${timeStr}</span>
                </div>
                <div class="w-[12%] flex justify-center items-center">
                    <span class="font-bold text-slate-600 text-[1.1rem]">${beltValue}</span>
                </div>
                <div class="w-[24%] flex justify-end items-center">
                    <span class="font-medium text-slate-500 text-[1rem]">
                        ${terminal} ${fidsState.mode === 'D' ? `<span class="mx-1 text-slate-300">|</span> ${desk}` : ''}
                    </span>
                    ${statusRemark && fidsState.mode === 'A' ? `<span class="fids-status-tag hidden sm:inline-block">${statusRemark}</span>` : ''}
                </div>
            </div>
        `;
    }).join('');

    fidsUI.list.innerHTML = blocksHTML;
}
</script>
