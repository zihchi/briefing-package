 <div class="section altimetry-section" id="altimetryBox">
    <h2>
      <div>❄️ ICAO 低溫修正 (Altimetry)</div>
      <button id="resetAltimetryBtn" class="app-header-btn" title="重設所有數值">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </h2>

    <div class="app-wrapper">
      
      <!-- 頂部參數設定區塊 -->
      <div class="app-card" style="margin-bottom: 15px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; align-items: start;">
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <div class="app-label" style="margin: 0;">Aerodrome Elevation (ft)</div>
            <input type="number" id="altElev" class="app-text-input" placeholder="Enter Elevation" oninput="updateAltimetry()">
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <div class="app-label" style="margin: 0;">Aerodrome Temp (°C)</div>
            <input type="number" id="altTemp" class="app-text-input" placeholder="e.g. -10" style="color: #3c79ff;" oninput="updateAltimetry()">
          </div>
        </div>

        <div style="border-top: 1px dashed #eee; padding-top: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; justify-content: space-between;">
          <div style="flex: 1; min-width: 250px;">
            <div class="app-label">Approach Type</div>
            <div class="app-toggle tri-toggle" style="margin-bottom: 0;">
              <button class="app-toggle-btn active" data-type="NPA(2D)" onclick="setAltApproach('NPA(2D)', 0)">NPA(2D)</button>
              <button class="app-toggle-btn" data-type="APV-Baro(3D)" onclick="setAltApproach('APV-Baro(3D)', 1)">APV-Baro(3D)</button>
              <button class="app-toggle-btn" data-type="PA (ILS)" onclick="setAltApproach('PA (ILS)', 2)">PA (ILS)</button>
              <div id="altAppPill" class="app-toggle-pill" style="transform: translateX(0);"></div>
            </div>
            <input type="hidden" id="altAppType" value="NPA(2D)">
          </div>

          <div>
            <div class="app-label" style="text-align: right;">FPA / Glide Path (°)</div>
            <div class="app-time-input" style="background: rgba(249,250,251,0.8); border: 1px solid #eee;">
              <input type="number" id="altFpa" step="0.1" value="3.0" style="width: 60px; color:#333;" oninput="updateAltimetry()">
              <span style="color:#aaa;">→</span>
              <span id="altFpaResult" style="width: 60px; text-align: center; color: #3c79ff; font-weight: bold;">3.00°</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 高度修正表格區塊 -->
      <div class="app-card" style="padding: 1.5em 1em;">
        <div class="alt-table-wrapper">
          <div class="alt-table">
            
            <!-- 表頭 -->
            <div class="alt-header">
              <div style="padding-left: 10px;">RAB 6.10.2</div>
              <div style="text-align: right; padding-right: 10px;">Fix</div>
              <div style="text-align: center;">Altitude (ft)</div>
              <div style="text-align: center; color: #3c79ff;">Correction</div>
              <div style="text-align: center;">Corrected (ft)</div>
            </div>

            <!-- 動態列容器 -->
            <div id="altRowsContainer"></div>

          </div>
        </div>

        <!-- RAB Notes 動態提示 -->
        <div id="altNotesBox" class="alt-notes-box"></div>

        <!-- 新增自訂列按鈕 -->
        <button class="btn-outline" onclick="addAltCustomRow()">+ Add Custom Row</button>
      </div>

    </div>
  </div>
