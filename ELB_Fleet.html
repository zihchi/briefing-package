<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ELB 機隊">
    <title>ELB 機隊 Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:       #0f172a;
            --surface:  #1e293b;
            --border:   #334155;
            --text:     #e2e8f0;
            --muted:    #94a3b8;
            --dim:      #475569;
            --accent:   #3b82f6;
            --green:    #22c55e;
            --yellow:   #f59e0b;
            --orange:   #f97316;
            --red:      #ef4444;
            --purple:   #8b5cf6;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* ─── Header ─── */
        .app-header {
            background: #0c1525;
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-title { flex: 1; min-width: 0; }
        .app-title h1 {
            font-size: 17px;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        .app-title small {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hdr-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 15px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .hdr-btn:active { background: #334155; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hdr-btn.spinning { animation: spin 0.8s linear infinite; }
        .hdr-btn.active { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.5); color: #60a5fa; }

        /* ─── Summary Bar ─── */
        #summary-bar {
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding: 6px 14px;
            display: flex;
            gap: 14px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #summary-bar::-webkit-scrollbar { display: none; }
        .sum-item {
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }
        .sum-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sum-dot.flight  { background: var(--green); }
        .sum-dot.ground  { background: var(--dim); }
        .sum-dot.maint   { background: var(--orange); }
        .sum-dot.aog     { background: var(--red); }
        .sum-val { font-weight: 700; color: var(--text); }

        /* ─── Settings Row ─── */
        .settings-row {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(59,130,246,0.06);
            border-bottom: 1px solid rgba(59,130,246,0.2);
        }
        .settings-row.open { display: flex; }
        .settings-label {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .settings-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            padding: 7px 10px;
            font-size: 12px;
            outline: none;
            min-width: 0;
        }
        .settings-input:focus { border-color: var(--accent); }
        .btn-save {
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 7px 14px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── Content ─── */
        #app-content { padding: 10px 10px 28px; }

        /* ─── State Screens ─── */
        .state-center {
            text-align: center;
            padding: 60px 24px;
            color: var(--muted);
        }
        .state-icon { font-size: 42px; margin-bottom: 14px; }
        .state-msg  { font-size: 14px; line-height: 1.8; }
        .state-err  { color: #fca5a5; font-size: 12px; margin-top: 8px; }
        .retry-btn {
            display: inline-block;
            margin-top: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            padding: 9px 22px;
            cursor: pointer;
        }
        .setup-banner {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 14px;
            padding: 20px 18px;
            margin: 8px 0;
        }
        .setup-banner h3 { font-size: 15px; font-weight: 700; color: #93c5fd; margin-bottom: 10px; }
        .setup-steps {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.85;
            margin-bottom: 14px;
        }
        .setup-steps code {
            background: rgba(0,0,0,0.35);
            color: #7dd3fc;
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 11px;
        }
        .setup-input-row { display: flex; gap: 8px; }
        .setup-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            min-width: 0;
        }
        .setup-input:focus { border-color: var(--accent); }
        .btn-primary {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            padding: 9px 18px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ─── Group Header ─── */
        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 2px 8px;
            margin-top: 6px;
        }
        .group-header h2 {
            font-size: 12px;
            font-weight: 700;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }
        .group-count {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 10px;
            color: var(--muted);
            padding: 1px 7px;
        }
        .group-line { flex: 1; height: 1px; background: rgba(255,255,255,0.05); }

        /* ─── Card Grid ─── */
        .ac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 9px;
        }

        /* ─── Aircraft Card ─── */
        .ac-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        /* Top status stripe */
        .ac-card.s-flight { border-top: 3px solid var(--green); }
        .ac-card.s-ground { border-top: 3px solid #1e293b; }
        .ac-card.s-maint  { border-top: 3px solid var(--orange); }
        .ac-card.s-aog    { border-top: 3px solid var(--red); }

        /* Card head */
        .ac-head {
            padding: 9px 12px 7px;
            display: flex;
            align-items: center;
            gap: 7px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .ac-tail {
            font-size: 15px;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: 0.03em;
            flex: 1;
        }
        .badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.4;
        }
        .b-type   { background: rgba(59,130,246,0.14);  color: #60a5fa; }
        .b-flight { background: rgba(34,197,94,0.14);   color: #4ade80; }
        .b-ground { background: rgba(100,116,139,0.14); color: #94a3b8; }
        .b-maint  { background: rgba(249,115,22,0.14);  color: #fb923c; }
        .b-aog    { background: rgba(239,68,68,0.22);   color: #f87171; }
        .b-exp    { background: rgba(239,68,68,0.14);   color: #f87171; }
        .b-soon   { background: rgba(245,158,11,0.14);  color: #fbbf24; }

        /* Card body */
        .ac-body { padding: 7px 12px 9px; }

        .ac-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 2.5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.035);
        }
        .ac-row:last-child { border-bottom: none; }
        .ac-lbl { font-size: 11px; color: var(--muted); flex-shrink: 0; margin-right: 8px; }
        .ac-val { font-size: 12px; color: var(--text); text-align: right; word-break: break-word; }
        .ac-val.hi     { color: #f8fafc; font-weight: 600; }
        .ac-val.warn   { color: var(--yellow); }
        .ac-val.danger { color: var(--red); }
        .ac-val.ok     { color: var(--green); }
        .ac-val.dim    { color: var(--dim); }

        /* Defect chips */
        .defect-strip {
            display: flex;
            gap: 5px;
            padding: 5px 0 3px;
            border-bottom: 1px solid rgba(255,255,255,0.035);
            flex-wrap: wrap;
        }
        .dc {
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 5px;
            padding: 3px 7px;
        }
        .dc-lbl { font-size: 9px; color: var(--muted); }
        .dc-val { font-size: 13px; font-weight: 800; }
        .dc.tech  .dc-val { color: var(--orange); }
        .dc.cabin .dc-val { color: var(--yellow); }
        .dc.mel   .dc-val { color: var(--purple); }
        .dc.insp  .dc-val { color: #67e8f9; }
        .dc.zero  .dc-val { color: #2d3e55; }

        /* Restrictions */
        .restrict-row {
            display: flex;
            gap: 6px;
            align-items: flex-start;
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.18);
            border-radius: 6px;
            padding: 4px 8px;
            margin-top: 4px;
            font-size: 11px;
            color: #fca5a5;
            line-height: 1.55;
        }

        /* OOOI */
        .oooi-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            padding: 6px 0 2px;
            border-top: 1px solid rgba(255,255,255,0.04);
            margin-top: 3px;
        }
        .oooi-cell { text-align: center; }
        .oooi-lbl { font-size: 9px; color: var(--dim); text-transform: uppercase; margin-bottom: 1px; }
        .oooi-val { font-size: 11px; font-variant-numeric: tabular-nums; }
        .oooi-val.v { color: #93c5fd; font-weight: 600; }
        .oooi-val.e { color: #1e3a52; }

        /* Footer note */
        .footer-note {
            text-align: center;
            font-size: 10px;
            color: #1e3a52;
            padding: 12px 16px 4px;
        }

        @media (max-width: 479px) {
            .ac-grid { grid-template-columns: 1fr; }
            #app-content { padding: 8px 8px 24px; }
        }
        @media (min-width: 768px) {
            .ac-grid { grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); }
        }
        @media (min-width: 1200px) {
            #app-content { max-width: 1400px; margin: 0 auto; padding: 12px 20px 32px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
    <div class="app-title">
        <h1>✈️ ELB 機隊</h1>
        <small id="hdr-sub">— 尚未載入 —</small>
    </div>
    <button class="hdr-btn" id="btn-settings" title="設定 GAS 網址">⚙️</button>
    <button class="hdr-btn" id="btn-force"    title="強制更新（略過快取）">🔁</button>
    <button class="hdr-btn" id="btn-refresh"  title="重新整理">↻</button>
</header>

<!-- Summary Bar -->
<div id="summary-bar" style="display:none">
    <div class="sum-item"><span class="sum-dot flight"></span><span id="sum-flight">0</span> 在飛</div>
    <div class="sum-item"><span class="sum-dot ground"></span><span id="sum-ground">0</span> 停機</div>
    <div class="sum-item"><span class="sum-dot maint"></span> <span id="sum-maint">0</span> 維修</div>
    <div class="sum-item"><span class="sum-dot aog"></span>   <span id="sum-aog">0</span> AOG</div>
    <div class="sum-item">⚠️ <span id="sum-defects">0</span> Tech Def</div>
    <div class="sum-item">📋 <span id="sum-mel">0</span> MEL</div>
</div>

<!-- Settings Row -->
<div id="settings-row" class="settings-row">
    <span class="settings-label">GAS URL</span>
    <input id="gas-url-input" class="settings-input" type="url"
           placeholder="https://script.google.com/macros/s/.../exec">
    <button id="btn-save-url" class="btn-save">儲存</button>
</div>

<!-- Main Content -->
<div id="app-content"></div>

<script>
// ============================================================
//  ELB Fleet Dashboard — GAS Proxy
//  Config: localStorage['elb_gas_url']
// ============================================================

var GAS_KEY = 'elb_gas_url';

var app = {
    gasUrl:  localStorage.getItem(GAS_KEY) || '',
    loading: false,
    lastData: null
};

function $(id) { return document.getElementById(id); }
var content = $('app-content');

/* ── Settings ───────────────────────────── */
$('btn-settings').addEventListener('click', function() {
    var row = $('settings-row');
    var open = row.classList.contains('open');
    if (!open) {
        $('gas-url-input').value = app.gasUrl;
        row.classList.add('open');
        $('btn-settings').classList.add('active');
        $('gas-url-input').focus();
    } else {
        row.classList.remove('open');
        $('btn-settings').classList.remove('active');
    }
});

$('btn-save-url').addEventListener('click', saveUrl);
$('gas-url-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveUrl();
});

function saveUrl() {
    var url = $('gas-url-input').value.trim();
    if (!url) return;
    app.gasUrl = url;
    localStorage.setItem(GAS_KEY, url);
    $('settings-row').classList.remove('open');
    $('btn-settings').classList.remove('active');
    loadData(false);
}

/* ── Refresh Buttons ─────────────────────── */
$('btn-refresh').addEventListener('click', function() { loadData(false); });
$('btn-force').addEventListener('click',   function() { loadData(true);  });

/* ── Fetch ───────────────────────────────── */
function loadData(force) {
    if (!app.gasUrl) { renderSetup(); return; }
    if (app.loading)  return;

    app.loading = true;
    $('btn-refresh').classList.add('spinning');
    $('hdr-sub').textContent = '載入中…';

    var url = app.gasUrl + (force ? '?refresh=1' : '');
    fetch(url)
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(json) {
            app.loading = false;
            $('btn-refresh').classList.remove('spinning');
            if (!json.ok) throw new Error(json.error || '未知錯誤');
            app.lastData = json.data;
            renderFleet(json.data);
        })
        .catch(function(err) {
            app.loading = false;
            $('btn-refresh').classList.remove('spinning');
            renderError(String(err));
        });
}

/* ── Setup Screen ────────────────────────── */
function renderSetup() {
    $('summary-bar').style.display = 'none';
    content.innerHTML =
        '<div class="setup-banner">' +
        '<h3>🔧 需要 GAS 代理網址才能顯示機隊資料</h3>' +
        '<div class="setup-steps">' +
        '① 開啟 <b>script.google.com</b>，建立新專案<br>' +
        '② 貼上 GAS 程式碼（請向管理員索取）<br>' +
        '③ 在編輯器執行 <code>setup()</code> 儲存 ELB 帳密<br>' +
        '④ 點選 <b>部署 → 新增部署</b>，類型選「網頁應用程式」，<br>' +
        '&nbsp;&nbsp;&nbsp;&nbsp;執行身分：<b>我</b>，存取：<b>所有人</b><br>' +
        '⑤ 複製部署網址，貼到下方</div>' +
        '<div class="setup-input-row">' +
        '<input id="setup-url" class="setup-input" type="url" ' +
        'placeholder="https://script.google.com/macros/s/.../exec">' +
        '<button id="setup-ok" class="btn-primary">確認</button>' +
        '</div></div>';

    $('setup-ok').addEventListener('click', function() {
        var url = $('setup-url').value.trim();
        if (!url) return;
        app.gasUrl = url;
        localStorage.setItem(GAS_KEY, url);
        loadData(false);
    });
    $('setup-url').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') $('setup-ok').click();
    });
}

/* ── Error Screen ────────────────────────── */
function renderError(msg) {
    $('hdr-sub').textContent = '載入失敗';
    content.innerHTML =
        '<div class="state-center">' +
        '<div class="state-icon">⚠️</div>' +
        '<div class="state-msg">資料載入失敗</div>' +
        '<div class="state-err">' + esc(msg) + '</div>' +
        '<button class="retry-btn" onclick="loadData(false)">重新嘗試</button>' +
        '</div>';
}

/* ── Render Fleet ────────────────────────── */
function renderFleet(data) {
    var metaList  = data.aircraftMeta || [];
    var fleetData = data.fleetData    || {};
    var updatedAt = data.updatedAt;

    /* Header timestamp */
    if (updatedAt) {
        try {
            var d = new Date(updatedAt);
            var tpe = new Date(d.getTime() + 8 * 3600000);
            var hh  = padZ(tpe.getUTCHours());
            var mm  = padZ(tpe.getUTCMinutes());
            $('hdr-sub').textContent = '更新 ' + hh + ':' + mm + ' (TPE)';
        } catch(e) { $('hdr-sub').textContent = '已更新'; }
    }

    /* Group by type */
    var groups = {};
    metaList.forEach(function(m) {
        var t = getType(m);
        if (!groups[t]) groups[t] = [];
        groups[t].push(m);
    });

    /* Summary counts */
    var cnt = { flight: 0, ground: 0, maint: 0, aog: 0, defects: 0, mel: 0 };
    metaList.forEach(function(m) {
        var tail = m['Aircraft.aircraftIdentifier'] || '';
        var fd   = fleetData[tail] || {};
        var fk   = fleetSection(fd);
        var acd  = (fk && fk.aircraftData) ? fk.aircraftData : {};
        var acs  = fd.AircraftStatus || fd.aircraftStatus || {};
        var st   = getStatusClass(fmt(
            dig(acd, ['Flight Status', 'flightStatus']) ||
            dig(acs, ['flightState', 'FlightState', 'flightStatus'])
        ));
        cnt[st]++;
        cnt.defects += numVal(dig(acd, ['No. of Open Defect_Tech', 'No. of Open Defect (Tech)', 'OpenDefectTech']) ||
                              dig(acs, ['AircraftStatus.openDefectCount', 'openDefectCount'])) || 0;
        cnt.mel     += numVal(dig(acd, ['No. of DDs_MEL', 'No. of DDs (MEL)', 'MelCount']) ||
                              dig(acs, ['AircraftStatus.deferredDefectCount', 'deferredDefectCount'])) || 0;
    });

    $('sum-flight').textContent  = cnt.flight;
    $('sum-ground').textContent  = cnt.ground;
    $('sum-maint').textContent   = cnt.maint;
    $('sum-aog').textContent     = cnt.aog;
    $('sum-defects').textContent = cnt.defects;
    $('sum-mel').textContent     = cnt.mel;
    $('summary-bar').style.display = '';

    /* Build HTML */
    var html = '';
    var order = ['A321', 'A330', 'A350'];
    var rendered = {};

    order.forEach(function(t) {
        if (groups[t]) {
            html += renderGroup(t, groups[t], fleetData);
            rendered[t] = true;
        }
    });
    Object.keys(groups).forEach(function(t) {
        if (!rendered[t]) html += renderGroup(t, groups[t], fleetData);
    });

    if (!html) {
        html = '<div class="state-center"><div class="state-icon">🤷</div>' +
               '<div class="state-msg">沒有機隊資料</div></div>';
    }

    html += '<div class="footer-note">GAS 快取最多 4 分鐘 · 🔁 略過快取強制更新</div>';

    /* Debug – raw JSON for first aircraft (helps tune parsing) */
    var firstTail = metaList.length > 0 ? (metaList[0]['Aircraft.aircraftIdentifier'] || '') : '';
    if (firstTail && fleetData[firstTail]) {
        html += '<details style="margin:4px 4px 16px;">' +
                '<summary style="font-size:10px;color:#1e3a52;cursor:pointer;padding:4px 2px;">' +
                '🔬 原始資料 Debug (' + esc(firstTail) + ')</summary>' +
                '<pre style="background:#020617;color:#3b4a5c;font-size:9px;padding:10px;' +
                'border-radius:8px;overflow:auto;max-height:320px;white-space:pre-wrap;' +
                'word-break:break-all;margin-top:4px;">' +
                esc(JSON.stringify(fleetData[firstTail], null, 2)) +
                '</pre></details>';
    }

    content.innerHTML = html;
}

/* ── Group ───────────────────────────────── */
function renderGroup(type, list, fleetData) {
    var h = '<div class="group-header">' +
            '<h2>' + esc(type) + '</h2>' +
            '<span class="group-count">' + list.length + '</span>' +
            '<div class="group-line"></div></div>';
    h += '<div class="ac-grid">';
    list.forEach(function(m) { h += renderCard(m, fleetData); });
    h += '</div>';
    return h;
}

/* ── Aircraft Card ───────────────────────── */
function renderCard(meta, fleetData) {
    var tail = meta['Aircraft.aircraftIdentifier'] || '?';
    var type = getType(meta);
    var fd   = fleetData[tail] || {};

    var fk  = fleetSection(fd);
    var acd = (fk && fk.aircraftData) ? fk.aircraftData : {};
    var acs = fd.AircraftStatus || fd.aircraftStatus || {};

    /* ── Extract fields ── */
    /* Flight No. may be a flightLog object containing route info */
    var rawFltNo = dig(acd, ['Flight No.', 'FlightNo', 'flightNumber']) ||
                   dig(acs, ['flightNumber', 'FlightNumber']);
    var flightNo, fltOrig, fltDest;
    if (rawFltNo && typeof rawFltNo === 'object' && !Array.isArray(rawFltNo)) {
        flightNo = valStr(dig(rawFltNo, ['flightNum','flightNumber','number','value','num']));
        if (flightNo) flightNo = flightNo.replace(/^JX\s*/i, '').trim() || null;
        fltOrig = valStr(dig(rawFltNo, ['flightOrigin','origin','dep','departure','departureStation','from']));
        fltDest = valStr(dig(rawFltNo, ['flightDestination','destination','dest','arr','arrival','arrivalStation','to']));
    } else {
        flightNo = cleanFltNo(rawFltNo);
        fltOrig  = null;
        fltDest  = null;
    }
    var flightSt = fmt(
        dig(acd, ['Flight Status', 'flightStatus', 'FlightStatus']) ||
        dig(acs, ['AircraftStatus.flightState', 'flightState', 'FlightState'])
    );
    var origin = fmt(dig(acs, ['AircraftStatus.flightOrigin', 'flightOrigin', 'FlightOrigin'])) || fltOrig;
    var dest   = fmt(dig(acs, ['AircraftStatus.flightDestination', 'flightDestination', 'FlightDestination'])) || fltDest;

    /* Defect / DD counts — ELB uses underscore-joined keys inside aircraftData */
    var techN  = numVal(dig(acd, ['No. of Open Defect_Tech',  'No. of Open Defect (Tech)',  'OpenDefectTech'])
                     || dig(acs, ['AircraftStatus.openDefectCount', 'openDefectCount']));
    var cabinN = numVal(dig(acd, ['No. of Open Defect_Cabin', 'No. of Open Defect (Cabin)', 'OpenDefectCabin']));
    var melN   = numVal(dig(acd, ['No. of DDs_MEL',    'No. of DDs (MEL)',    'MelCount'])
                     || dig(acs, ['AircraftStatus.deferredDefectCount', 'deferredDefectCount']));
    var inspN  = numVal(dig(acd, ['No. of DDs_Insp',   'No. of DDs (Insp)',   'InspCount']));
    var accN   = numVal(dig(acd, ['No. of DDs_Accept',  'No. of DDs (Accept)', 'AcceptCount']));
    var expN   = numVal(dig(acs, ['AircraftStatus.expiredCount', 'expiredCount']));

    var nextDD  = fmt(dig(acd, ['Next DD Expiry', 'NextDDExpiry', 'nextDDExpiry', 'nextExpiry']));
    var restr   = fmt(dig(acd, ['Restrictions', 'restrictions', 'Restriction']));
    var maintRl = fmt(dig(acd, ['Maint Released', 'maintReleased', 'MaintReleased']));

    /* OOOI — keys use "AircraftStatus.oooiXxx.actual" */
    var oOut = fmtUTC(dig(acs, ['AircraftStatus.oooiOut.actual', 'AircraftStatus.oooiOut.latest', 'oooiOut']));
    var oOff = fmtUTC(dig(acs, ['AircraftStatus.oooiOff.actual', 'oooiOff']));
    var oOn  = fmtUTC(dig(acs, ['AircraftStatus.oooiOn.actual',  'oooiOn']));
    var oIn  = fmtUTC(dig(acs, ['AircraftStatus.oooiIn.actual',  'AircraftStatus.oooiIn.latest', 'oooiIn']));

    /* ── Status ── */
    var sClass = getStatusClass(flightSt);
    var sBadge = statusBadge(flightSt, sClass);

    /* ── DD Expiry urgency ── */
    var ddDays = nextDD ? daysUntil(nextDD) : null;
    var ddExtra = '';
    if (ddDays !== null && (melN + inspN + accN) > 0) {
        if (ddDays < 0)      ddExtra = '<span class="badge b-exp">EXPIRED</span>';
        else if (ddDays <= 3) ddExtra = '<span class="badge b-exp">' + ddDays + 'd</span>';
        else if (ddDays <= 7) ddExtra = '<span class="badge b-soon">' + ddDays + 'd</span>';
    }

    /* ── Build HTML ── */
    var h = '<div class="ac-card s-' + sClass + '">';

    /* Head */
    h += '<div class="ac-head">';
    h += '<span class="ac-tail">' + esc(tail) + '</span>';
    h += '<span class="badge b-type">' + esc(type) + '</span>';
    h += sBadge;
    h += '</div>';

    /* Body */
    h += '<div class="ac-body">';

    /* Flight row */
    if (flightNo || origin || dest) {
        var routeParts = [];
        if (flightNo) routeParts.push('JX' + flightNo);
        if (origin && dest) routeParts.push(origin + ' → ' + dest);
        else if (origin) routeParts.push(origin + ' →');
        else if (dest)   routeParts.push('→ ' + dest);
        h += acRow('航班', '<span class="ac-val hi">' + esc(routeParts.join('  ')) + '</span>');
    }

    /* Defect chips */
    var anyDefData = techN !== null || cabinN !== null || melN !== null;
    if (anyDefData) {
        h += '<div class="defect-strip">';
        h += defChip('Tech',  techN,  'tech');
        h += defChip('Cabin', cabinN, 'cabin');
        h += defChip('MEL',   melN,   'mel');
        if (inspN > 0) h += defChip('Insp', inspN, 'insp');
        if (accN  > 0) h += defChip('Acc',  accN,  'insp');
        if (expN  > 0) h += defChip('Exp',  expN,  'tech');
        h += '</div>';
    }

    /* Next DD expiry */
    if (nextDD && (melN + inspN + accN) > 0) {
        var ddValClass = ddDays !== null && ddDays < 0 ? 'danger' : (ddDays !== null && ddDays <= 7 ? 'warn' : '');
        h += acRow('Next DD Expiry',
            '<span class="ac-val ' + ddValClass + '">' + esc(nextDD) + ' ' + ddExtra + '</span>');
    }

    /* Maint Released — show warning when not explicitly "Released" */
    var isReleased = !maintRl || maintRl.toLowerCase() === 'released' ||
                     maintRl.toLowerCase() === 'yes' || maintRl.toLowerCase() === 'y';
    if (!isReleased && maintRl) {
        h += acRow('Maint Released', '<span class="ac-val warn">' + esc(maintRl) + ' ⚠️</span>');
    }

    /* Restrictions */
    var noRestr = !restr || restr === '0' || restr === '-' ||
                  restr.toLowerCase() === 'none' || restr.toLowerCase() === 'nil' ||
                  restr.toLowerCase() === 'n/a' || restr.toLowerCase() === 'no';
    if (!noRestr) {
        h += '<div class="restrict-row"><span>⛔</span><span>' + esc(restr) + '</span></div>';
    }

    /* OOOI */
    if (oOut || oOff || oOn || oIn) {
        h += '<div class="oooi-strip">';
        h += oooiCell('OUT', oOut);
        h += oooiCell('OFF', oOff);
        h += oooiCell('ON',  oOn);
        h += oooiCell('IN',  oIn);
        h += '</div>';
    }

    /* No data at all */
    var noData = !flightNo && !flightSt && !anyDefData && Object.keys(fd).length === 0;
    if (noData) {
        h += '<div style="color:#2d3e55;font-size:11px;padding:4px 0;text-align:center">— 等待資料 —</div>';
    }

    h += '</div></div>';
    return h;
}

/* ── Small Builders ──────────────────────── */
function acRow(lbl, valHtml) {
    return '<div class="ac-row"><span class="ac-lbl">' + esc(lbl) + '</span>' + valHtml + '</div>';
}

function defChip(lbl, n, cls) {
    var zero = (!n || n === 0) ? ' zero' : '';
    return '<div class="dc ' + cls + zero + '">' +
           '<span class="dc-lbl">' + lbl + '</span>' +
           '<span class="dc-val">' + (n == null ? '?' : n) + '</span></div>';
}

function oooiCell(lbl, val) {
    return '<div class="oooi-cell">' +
           '<div class="oooi-lbl">' + lbl + '</div>' +
           '<div class="oooi-val ' + (val ? 'v' : 'e') + '">' + (val || '——') + '</div></div>';
}

function statusBadge(flightSt, sClass) {
    var cls  = { flight:'b-flight', ground:'b-ground', maint:'b-maint', aog:'b-aog' }[sClass] || 'b-ground';
    var label = flightSt ? (flightSt.length > 18 ? flightSt.substring(0, 16) + '…' : flightSt) : 'On Ground';
    return '<span class="badge ' + cls + '">' + esc(label) + '</span>';
}

/* ── Helpers ─────────────────────────────── */
function esc(v) {
    if (v == null) return '—';
    return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* Convert any value (including nested objects) to a usable string */
function valStr(v) {
    if (v == null) return null;
    if (typeof v === 'string') return v.trim() || null;
    if (typeof v === 'number') return String(v);
    if (typeof v === 'boolean') return null;
    if (Array.isArray(v)) { return v.length ? valStr(v[0]) : null; }
    if (typeof v === 'object') {
        var probe = ['value','displayValue','displayText','text','label',
                     'statusLabel','status','statusCode','code','name','description',
                     'flightNum','flightNumber','typeName','aircraftTypeName'];
        for (var i = 0; i < probe.length; i++) {
            var p = v[probe[i]];
            if (typeof p === 'string' && p.trim()) return p.trim();
            if (typeof p === 'number' && !isNaN(p)) return String(p);
        }
        var strs = [];
        Object.keys(v).forEach(function(k) {
            var pv = v[k];
            if (typeof pv === 'string' && pv.trim()) strs.push(pv.trim());
        });
        strs.sort(function(a, b) { return a.length - b.length; });
        return strs.length ? strs[0] : null;
    }
    return null;
}
function fmt(v) { return valStr(v); }

function dig(obj, keys) {
    if (!obj) return null;
    for (var i = 0; i < keys.length; i++) {
        var v = obj[keys[i]];
        if (v !== undefined && v !== null && v !== '') return v;
    }
    return null;
}

function numVal(v) {
    if (v == null) return null;
    if (typeof v === 'number') return v;
    if (typeof v === 'object') {
        var n = v.count !== undefined ? v.count :
                v.value !== undefined ? v.value :
                v.total !== undefined ? v.total :
                v.number !== undefined ? v.number : null;
        if (n != null) { var r = parseInt(n, 10); return isNaN(r) ? 0 : r; }
        return null;
    }
    var n = parseInt(v, 10);
    return isNaN(n) ? null : n;
}

function padZ(n) { return n < 10 ? '0' + n : String(n); }

function fmtUTC(iso) {
    if (!iso) return null;
    try {
        var d = new Date(iso);
        if (isNaN(d)) return null;
        return padZ(d.getUTCHours()) + padZ(d.getUTCMinutes()) + 'Z';
    } catch(e) { return null; }
}

function parseDate(str) {
    if (!str) return null;
    var d = new Date(str);
    if (!isNaN(d)) return d;
    var MONTHS = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
    var m = String(str).match(/^(\d{1,2})[- ]([A-Z]{3})[- ](\d{4})$/i);
    if (m) {
        var mon = MONTHS[m[2].toUpperCase()];
        if (mon !== undefined) return new Date(parseInt(m[3]), mon, parseInt(m[1]));
    }
    return null;
}

function daysUntil(str) {
    var d = parseDate(str);
    if (!d) return null;
    return Math.ceil((d - Date.now()) / 86400000);
}

function cleanFltNo(v) {
    if (!v) return null;
    if (typeof v === 'object' && !Array.isArray(v)) {
        /* Flight No. field may be a flightLog object */
        var fn = v.flightNum || v.flightNumber || v.number || v.value || v.num;
        return fn ? String(fn).trim().replace(/^JX\s*/i, '') || null : null;
    }
    var s = String(v).trim().replace(/^JX\s*/i, '');
    return s || null;
}

/* Find the "Combined Fleet" section in fleetData[tail] response */
function fleetSection(fd) {
    if (!fd) return null;
    if (fd['Combined Fleet'])   return fd['Combined Fleet'];
    if (fd['Combined%20Fleet']) return fd['Combined%20Fleet'];
    var keys = Object.keys(fd);
    for (var i = 0; i < keys.length; i++) {
        var k = keys[i].toLowerCase();
        if (k.includes('fleet') || k.includes('combined')) return fd[keys[i]];
    }
    return null;
}

/* Infer aircraft type from meta fields or tail number */
function getType(meta) {
    var raw = dig(meta, [
        'Aircraft.aircraftGroupName', 'Aircraft.aircraftType',
        'Aircraft.subtype', 'aircraftGroupName', 'aircraftType',
        'groupName', 'type'
    ]);
    if (raw) {
        var u = String(raw).toUpperCase();
        if (u.includes('A330') || u.includes('330')) return 'A330';
        if (u.includes('A321') || u.includes('321')) return 'A321';
        if (u.includes('A350') || u.includes('350')) return 'A350';
        if (u.includes('A320') || u.includes('320')) return 'A320';
    }
    /* Fallback: Starlux tail ranges */
    var tail = meta['Aircraft.aircraftIdentifier'] || '';
    if (/^B-583/.test(tail)) return 'A330';
    if (/^B-582/.test(tail)) return 'A321';
    if (/^B-584/.test(tail)) return 'A350';
    if (/^B-585/.test(tail)) return 'A350';
    return 'Other';
}

/* Map flight status string → CSS class */
function getStatusClass(flightSt) {
    if (!flightSt) return 'ground';
    var u = String(flightSt).toUpperCase();
    if (u.includes('AOG'))                            return 'aog';
    if (u.includes('MAINT') || u.includes('HANGAR')) return 'maint';
    if (u.includes('FLIGHT') || u.includes('AIR') ||
        u.includes('DEPART') || u.includes('EN ROUTE') ||
        u.includes('AIRBORNE'))                       return 'flight';
    return 'ground';
}

/* ── Init ────────────────────────────────── */
(function() {
    if (app.gasUrl) {
        content.innerHTML =
            '<div class="state-center">' +
            '<div class="state-icon" style="display:inline-block;animation:spin .8s linear infinite">↻</div>' +
            '<div class="state-msg" style="margin-top:12px">載入機隊資料中…</div></div>';
        loadData(false);
    } else {
        renderSetup();
    }
})();
</script>
</body>
