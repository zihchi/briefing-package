<style>
  /* === Curfew 倒數：暖色「咖啡／香檳」主題（scoped to #curfewBox） === */
  #curfewBox .curfew-clock-container { background:#4a3627; border:2px solid #7a4e23; box-shadow:inset 0 2px 6px rgba(0,0,0,.35); border-radius:14px; padding:12px; text-align:center; }
  #curfewBox .curfew-utc-label { color:#d8c4ad; font-size:.78em; font-weight:bold; letter-spacing:2px; }
  #curfewBox .curfew-live-clock { color:#e0a96d; font-size:1.7em; font-weight:bold; font-family:ui-monospace,monospace; text-shadow:0 0 10px rgba(224,169,109,.45); line-height:1.1; }
  #curfewBox .cf-count { margin-top:8px; font-family:ui-monospace,monospace; font-weight:bold; font-size:1.05em; color:#d8c4ad; }

  #curfewBox .app-toggle { position:relative; display:flex; background:#efe6da; border-radius:999px; overflow:hidden; padding:2px; }
  #curfewBox .app-toggle-btn { flex:1; border:none; background:transparent; padding:8px; z-index:2; position:relative; cursor:pointer; font-weight:bold; color:#a8a29e; min-height:38px; }
  #curfewBox .app-toggle-btn.active { color:#4a3627; }
  #curfewBox .app-toggle-pill { position:absolute; top:2px; bottom:2px; left:2px; width:calc(50% - 2px); background:#fff; border-radius:999px; z-index:1; transition:transform .3s; box-shadow:0 2px 6px rgba(74,54,39,.14); }

  #curfewBox .cf-card { background:#faf6f0; border:1px solid #e7ddd0; border-radius:14px; padding:14px; }
  #curfewBox .cf-label { font-size:.7rem; font-weight:800; color:#a8a29e; text-transform:uppercase; letter-spacing:.04em; }
  #curfewBox input.cf-in { width:100%; padding:9px 8px; border:1px solid #e7ddd0; border-radius:10px; text-align:center; font-size:1.05em; font-family:ui-monospace,monospace; color:#4a3627; background:#fff; box-sizing:border-box; min-height:40px; }
  #curfewBox input.cf-in:focus { outline:none; border-color:#8b5a2b; box-shadow:0 0 0 2px rgba(139,90,43,.18); }
  #curfewBox select.cf-sel { padding:9px 8px; border:1px solid #e7ddd0; border-radius:10px; font-weight:bold; color:#4a3627; background:#fff; text-align:center; min-height:40px; }
  #curfewBox .cf-badge { cursor:pointer; user-select:none; font-size:.72rem; font-weight:900; padding:4px 9px; border-radius:7px; }
  #curfewBox .cf-badge.z { background:#dbeafe; color:#1d4ed8; border:1px solid #bfdbfe; }
  #curfewBox .cf-badge.l { background:#f6eddd; color:#8a5a2b; border:1px solid #d8bd91; }
  #curfewBox .cf-sector { border:1px solid #e7ddd0; border-radius:12px; padding:10px; background:#fff; }
  #curfewBox .cf-ta { display:flex; align-items:center; justify-content:center; gap:8px; }
  #curfewBox .cf-btn { font-size:.8rem; font-weight:800; border-radius:9px; padding:8px 12px; cursor:pointer; border:1px solid; min-height:38px; }
  #curfewBox .cf-result { border:2px solid #8b5a2b; background:rgba(139,90,43,.06); border-radius:14px; padding:14px; }
  #curfewBox .cf-lcl { color:#8a5a2b; }
  #curfewBox .cf-utc { color:#1d4ed8; }
  #curfewBox .cf-timeline { position:relative; height:96px; background:#fff; border:1px solid #e7ddd0; border-radius:10px; overflow:hidden; }
  #curfewBox .cf-blk { position:absolute; height:26px; line-height:26px; text-align:center; color:#fff; font-size:11px; font-weight:700; border-radius:5px; overflow:hidden; white-space:nowrap; }
  #curfewBox .cf-tick { position:absolute; top:0; height:100%; border-left:1px dashed #c8b9a6; }
  #curfewBox .cf-ticklbl { position:absolute; top:60px; transform:translateX(-50%); font-size:9px; font-family:ui-monospace,monospace; background:rgba(255,255,255,.95); border:1px solid #e7ddd0; border-radius:4px; padding:1px 3px; white-space:pre-line; text-align:center; line-height:1.1; }
  #curfewBox .hide { display:none !important; }

  @media (max-width: 480px) {
    #curfewBox .curfew-live-clock { font-size:1.5em; }
  }
</style>

<div class="section curfew-section" id="curfewBox">
  <h2 style="display:flex;justify-content:space-between;align-items:center;">
    <div>⏳ Curfew Calculator</div>
    <button id="resetCurfewBtn" class="app-header-btn" title="重設所有數值">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </button>
  </h2>

  <div class="app-wrapper" style="display:flex;flex-direction:column;gap:14px;">

    <!-- Live UTC clock + countdown -->
    <div class="curfew-clock-container">
      <div class="curfew-utc-label">UTC TIME</div>
      <div class="curfew-live-clock" id="liveUTCClock">--:--:--</div>
      <div class="cf-count" id="curfewCountdown">距最晚後推 --:--:--</div>
    </div>

    <!-- Curfew type -->
    <div class="app-toggle" id="cfTypeToggle">
      <button class="app-toggle-btn cf-type-btn" data-type="landing">Landing 落地</button>
      <button class="app-toggle-btn active cf-type-btn" data-type="parking">Parking 關車</button>
      <div class="app-toggle-pill" id="cfTypePill" style="transform:translateX(100%);"></div>
    </div>

    <!-- Curfew time -->
    <div class="cf-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="cf-label">Arrival Curfew 宵禁時間</span>
        <span class="cf-badge z" id="cfBadge" title="點此切換 Z / L">Z</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input type="date" id="cfDate" class="cf-in" style="flex:2 1 130px;">
        <input type="text" inputmode="numeric" placeholder="HH:MM" id="cfTime" class="cf-in cf-ntime" style="flex:1 1 80px;">
        <select id="cfTz" class="cf-sel" style="flex:1 1 80px;"></select>
      </div>
      <div class="cf-label" id="cfConv" style="margin-top:6px;text-align:right;"></div>
    </div>

    <!-- Sectors -->
    <div>
      <div class="cf-label" id="cfSecLabel" style="margin-bottom:6px;">Sectors 航段（Block Time，HH:MM）</div>
      <div class="app-toggle" id="cfInputModeToggle" style="margin-bottom:8px;">
        <button class="app-toggle-btn cf-imode-btn active" data-imode="block">Block Time</button>
        <button class="app-toggle-btn cf-imode-btn" data-imode="detail">Taxi 明細</button>
        <div class="app-toggle-pill" id="cfInputModePill" style="transform:translateX(0);"></div>
      </div>
      <div class="cf-label" id="cfBlockHint" style="margin:-2px 2px 8px;color:#a8a29e;font-weight:600;text-transform:none;letter-spacing:0;">ℹ️ Block 模式僅算最晚後推；起飛時間與落地宵禁請切換 Taxi 明細</div>
      <div id="cfSectors" style="display:flex;flex-direction:column;gap:10px;"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button id="cfAddBtn" class="cf-btn" style="color:#1d4ed8;background:#eff6ff;border-color:#bfdbfe;">+ 航段</button>
        <button id="cfRemoveBtn" class="cf-btn hide" style="color:#475569;background:#f1f5f9;border-color:#cbd5e1;">− 移除</button>
        <button id="cfClearBtn" class="cf-btn" style="margin-left:auto;color:#b91c1c;background:#fef2f2;border-color:#fecaca;">🧹 清空</button>
      </div>
    </div>

    <!-- Results -->
    <div class="cf-result">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="cf-label">Total 全程時長 (含轉場)</span>
        <span id="cfTotal" style="font-family:ui-monospace,monospace;font-weight:800;color:#4a3627;font-size:1.1em;">--:--</span>
      </div>
      <div style="border-top:1px solid #e7ddd0;margin-top:10px;padding-top:10px;">
        <div class="cf-label">Latest Off-Block 最晚後推 (Sector 1 OUT)</div>
        <div id="cfPushback" style="font-family:ui-monospace,monospace;color:#a8a29e;margin-top:2px;">輸入宵禁與航段後計算</div>
        <div id="cfTakeoffRow">
          <div class="cf-label" style="margin-top:8px;">Latest Takeoff 最晚起飛 (Sector 1 OFF)</div>
          <div id="cfTakeoff" style="font-family:ui-monospace,monospace;color:#a8a29e;margin-top:2px;">--</div>
        </div>
      </div>
      <div id="cfSchedule" class="hide" style="border-top:1px solid #e7ddd0;margin-top:10px;padding-top:10px;"></div>
      <div id="cfTimelineWrap" class="hide" style="border-top:1px solid #e7ddd0;margin-top:10px;padding-top:10px;">
        <div class="cf-label" style="margin-bottom:6px;">回推時間軸 (UTC Z)</div>
        <div id="cfTimeline" class="cf-timeline"></div>
      </div>
    </div>

  </div>
</div>
