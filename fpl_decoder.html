<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICAO Flight Plan Decoder (Light Dashboard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9; /* 柔和的淺灰藍背景 */
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f8fafc; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col selection:bg-sky-200 selection:text-sky-900">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 shadow-sm py-5 px-4 md:px-8 flex items-center justify-between z-10 relative">
        <div class="flex items-center gap-3">
            <i data-lucide="plane-takeoff" class="w-8 h-8 text-sky-600"></i>
            <div>
                <h1 class="text-2xl font-bold tracking-wide text-slate-800">ICAO FPL Decoder</h1>             
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full grid grid-cols-1 xl:grid-cols-4 gap-6">
        
        <!-- Input Section -->
        <div class="xl:col-span-1 flex flex-col gap-4">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col h-full">
                <label for="fplInput" class="block text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <i data-lucide="terminal-square" class="w-5 h-5 text-sky-500"></i>
                    輸入飛行計畫 (Input Flight Plan)
                </label>
                <textarea id="fplInput" 
                    class="w-full flex-grow p-4 bg-slate-50 border border-slate-300 rounded-lg text-sm font-mono text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 custom-scrollbar resize-none transition-all leading-relaxed"
                    placeholder="輸入範例：(FPL-SJX805-IS&#10;-A339/H-SDE1E2E3FGHIJ3J4J7M3P2RWYZ/LB1D1&#10;-RJAA1140&#10;-N0482F380 PIGOK Y50 IGMON A1 BULAN/N0473F380 A1 AIPOM/N0450F300 A1&#10; DRAKE DRAKE1A&#10;-RCTP0258 ROAH&#10;-PBN/A1B1C1D1L1O1S2 NAV/RNP2 SUR/RSP180 DOF/260501 REG/B58302&#10; EET/RCAA0227 SEL/JREF CODE/8991DD OPR/SJX PER/D RMK/TCAS)"
                ></textarea>
                
                <div class="mt-4 flex flex-col sm:flex-row gap-3">
                    <button id="decodeBtn" class="flex-1 bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 shadow-md">
                        <i data-lucide="cpu" class="w-5 h-5"></i>
                        解析 (Decode)
                    </button>
                    <button id="clearBtn" class="flex-1 bg-slate-100 hover:bg-slate-200 border border-slate-300 text-slate-600 font-bold py-3 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 shadow-sm">
                        <i data-lucide="rotate-ccw" class="w-5 h-5 text-slate-500"></i>
                        重置 (Reset)
                    </button>
                </div>
            </div>
        </div>

        <!-- Output Section (Annunciator Panels) -->
        <div class="xl:col-span-3 flex flex-col gap-6">
            
            <!-- Error Message Box -->
            <div id="error-box" class="hidden bg-rose-50 border border-rose-200 rounded-xl p-4 flex items-center gap-3 shadow-sm">
                <i data-lucide="alert-circle" class="w-6 h-6 text-rose-500"></i>
                <span id="error-text" class="text-rose-700 text-sm font-bold"></span>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Item 10a (COM/NAV) -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                    <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2">
                        <i data-lucide="radio" class="w-5 h-5 text-sky-500"></i>
                        <h2 class="text-sm font-extrabold text-slate-700 uppercase tracking-widest">通訊與導航 (COM/NAV - 10a)</h2>
                    </div>
                    <div class="p-5 flex-grow">
                        <!-- Dashboard Grid -->
                        <ul id="item10a-grid" class="grid grid-cols-1 md:grid-cols-2 gap-2.5 text-xs">
                            <!-- JS Will Populate This -->
                        </ul>
                    </div>
                </div>

                <!-- Item 10b (Surveillance) -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                    <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2">
                        <i data-lucide="radar" class="w-5 h-5 text-indigo-500"></i>
                        <h2 class="text-sm font-extrabold text-slate-700 uppercase tracking-widest">監視設備 (Surveillance - 10b)</h2>
                    </div>
                    <div class="p-5 flex-grow">
                        <!-- Dashboard Grid -->
                        <ul id="item10b-grid" class="grid grid-cols-1 md:grid-cols-2 gap-2.5 text-xs">
                            <!-- JS Will Populate This -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Item 18 (Other Information & PBN) -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2">
                    <i data-lucide="info" class="w-5 h-5 text-emerald-500"></i>
                    <h2 class="text-sm font-extrabold text-slate-700 uppercase tracking-widest">其他資訊與導航性能 (Item 18 & PBN)</h2>
                </div>
                
                <!-- PBN Grid Section -->
                <div class="p-5 border-b border-slate-100 bg-slate-50/30">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="crosshair" class="w-4 h-4 text-emerald-400"></i>
                        性能基礎導航 (PBN - Performance Based Navigation)
                    </h3>
                    <ul id="pbn-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-2.5 text-xs">
                        <!-- JS Will Populate This -->
                    </ul>
                </div>

                <!-- Other Info Section -->
                <div class="p-5">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="list-plus" class="w-4 h-4 text-emerald-400"></i>
                        附加裝備與代碼 (Other Information)
                    </h3>
                    <div id="item18-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-sm">
                        <!-- JS Will Populate This -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        // Master Dictionaries (Bilingual)
        const dict10a = {
            'N': '無通訊/導航/進場設備 (No COM/NAV)',
            'S': '標準備配無線電 (VHF, VOR, ILS)',
            'A': 'GBAS 著陸系統 (GBAS)',
            'B': 'LPV (APV 結合 SBAS)',
            'C': '羅蘭-C (LORAN C)',
            'D': '測距儀 (DME)',
            'E1': 'FMC WPR ACARS',
            'E2': 'D-FIS ACARS',
            'E3': 'PDC ACARS',
            'F': '自動測向儀 (ADF)',
            'G': '全球導航衛星系統 (GNSS)',
            'H': '高頻無線電 (HF RTF)',
            'I': '慣性導航系統 (INS)',
            'J1': 'CPDLC ATN VDL Mode 2',
            'J2': 'CPDLC FANS 1/A HFDL',
            'J3': 'CPDLC FANS 1/A VDL Mode A',
            'J4': 'CPDLC FANS 1/A VDL Mode 2',
            'J5': 'CPDLC FANS 1/A SATCOM (INMARSAT)',
            'J6': 'CPDLC FANS 1/A SATCOM (MTSAT)',
            'J7': 'CPDLC FANS 1/A SATCOM (Iridium)',
            'K': '微波著陸系統 (MLS)',
            'L': '儀器降落系統 (ILS)',
            'M1': 'ATC SATVOICE (INMARSAT)',
            'M2': 'ATC SATVOICE (MTSAT)',
            'M3': 'ATC SATVOICE (Iridium)',
            'O': '甚高頻全向信標 (VOR)',
            'P1': 'CPDLC RCP 400',
            'P2': 'CPDLC RCP 240',
            'P3': 'SATVOICE RCP 400',
            'R': '具備 PBN 核准 (PBN Approved)',
            'T': '戰術空中導航系統 (TACAN)',
            'U': '特高頻無線電 (UHF RTF)',
            'V': '甚高頻無線電 (VHF RTF)',
            'W': '具備 RVSM 核准 (RVSM Approved)',
            'X': '具備 MNPS 核准 (MNPS Approved)',
            'Y': '具備 8.33 kHz VHF (8.33 kHz VHF)',
            'Z': '其他設備 (Other, see Item 18)'
        };

        const dict10b = {
            'N': '無監視設備 (No Surveillance)',
            'A': '詢答機 Mode A (Mode A)',
            'C': '詢答機 Mode A/C (Mode A/C)',
            'E': 'Mode S (ID/ALT/ADS-B)',
            'H': 'Mode S (ID/ALT/Enhanced)',
            'I': 'Mode S (ID/no ALT)',
            'L': 'Mode S (ID/ALT/ADS-B/Enhanced)',
            'P': 'Mode S (ALT/no ID)',
            'S': 'Mode S (ID/ALT)',
            'X': 'Mode S (no ID/no ALT)',
            'B1': 'ADS-B 1090 MHz 發送 (Out)',
            'B2': 'ADS-B 1090 MHz 收發 (Out/In)',
            'U1': 'ADS-B UAT 發送 (Out)',
            'U2': 'ADS-B UAT 收發 (Out/In)',
            'V1': 'ADS-B VDL Mode 4 發送 (Out)',
            'V2': 'ADS-B VDL Mode 4 收發 (Out/In)',
            'D1': 'ADS-C (FANS 1/A)',
            'G1': 'ADS-C (ATN)'
        };

        // Complete PBN dictionary mapped strictly to FAA/ICAO Standards
        const dictPBN = {
            'A1': 'RNAV 10 (RNP 10)',
            'B1': 'RNAV 5 全許可感測器 (All Permitted)', 'B2': 'RNAV 5 (GNSS)', 'B3': 'RNAV 5 (DME/DME)', 'B4': 'RNAV 5 (VOR/DME)', 'B5': 'RNAV 5 (INS/IRS)', 'B6': 'RNAV 5 (LORANC)',
            'C1': 'RNAV 2 全許可感測器 (All Permitted)', 'C2': 'RNAV 2 (GNSS)', 'C3': 'RNAV 2 (DME/DME)', 'C4': 'RNAV 2 (DME/DME/IRU)',
            'D1': 'RNAV 1 全許可感測器 (All Permitted)', 'D2': 'RNAV 1 (GNSS)', 'D3': 'RNAV 1 (DME/DME)', 'D4': 'RNAV 1 (DME/DME/IRU)',
            'L1': 'RNP 4',
            'O1': 'Basic RNP 1 全許可 (All Permitted)', 'O2': 'Basic RNP 1 (GNSS)', 'O3': 'Basic RNP 1 (DME/DME)', 'O4': 'Basic RNP 1 (DME/DME/IRU)',
            'S1': 'RNP APCH', 'S2': 'RNP APCH 附帶 BARO-VNAV',
            'T1': 'RNP AR APCH 含 RF', 'T2': 'RNP AR APCH 不含 RF'
        };

        const dictItem18Keys = {
            'NAV': '其他導航設備 (NAV)',
            'DAT': '資料通訊應用 (DAT)',
            'SUR': '其他監視設備 (SUR)',
            'CODE': '航空器地址碼 (CODE)'
        };

        // Render generic Indicator Panel (used for 10a, 10b, and PBN)
        function renderIndicatorPanel(dict, containerId, activeTokens, theme) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // Light Theme setup for active vs inactive states
            const themes = {
                sky: { activeBg: 'bg-sky-50', activeBorder: 'border-sky-300', activeText: 'text-sky-900', activeBadge: 'bg-sky-600 text-white shadow-sm' },
                indigo: { activeBg: 'bg-indigo-50', activeBorder: 'border-indigo-300', activeText: 'text-indigo-900', activeBadge: 'bg-indigo-600 text-white shadow-sm' },
                emerald: { activeBg: 'bg-emerald-50', activeBorder: 'border-emerald-300', activeText: 'text-emerald-900', activeBadge: 'bg-emerald-600 text-white shadow-sm' }
            };
            const t = themes[theme];

            Object.entries(dict).forEach(([key, desc]) => {
                const isActive = activeTokens.includes(key);
                const li = document.createElement('li');
                
                // Panel Item Styling (Light Mode)
                const baseClass = "flex items-center p-2 rounded-md transition-all duration-300 border ";
                const stateClass = isActive 
                    ? `${t.activeBg} ${t.activeBorder} opacity-100 shadow-sm` 
                    : `bg-slate-50 border-slate-200 opacity-40 grayscale hover:opacity-70`;
                
                li.className = baseClass + stateClass;
                
                const badgeClass = isActive 
                    ? t.activeBadge 
                    : `bg-slate-200 text-slate-500 font-medium`;

                const textClass = isActive ? `${t.activeText} font-bold` : `text-slate-600 font-medium`;

                li.innerHTML = `
                    <span class="font-mono text-sm ${badgeClass} w-8 h-6 flex items-center justify-center rounded mr-2.5 shrink-0">${key}</span> 
                    <span class="${textClass} tracking-wide truncate" title="${desc}">${desc}</span>
                `;
                container.appendChild(li);
            });
        }

        function renderPanel18(activeData) {
            const container = document.getElementById('item18-grid');
            container.innerHTML = '';
            
            // Only render NAV, DAT, SUR, CODE in the generic block
            Object.keys(dictItem18Keys).forEach(key => {
                const isActive = activeData.hasOwnProperty(key);
                const value = isActive ? activeData[key] : 'Standby / 無資料';
                const keyDesc = dictItem18Keys[key];
                
                const div = document.createElement('div');
                
                // Light Mode Styling for Item 18 generic inputs
                const baseClass = "rounded-lg p-3 transition-all duration-300 border flex flex-col ";
                const stateClass = isActive
                    ? "bg-emerald-50 border-emerald-300 shadow-sm opacity-100"
                    : "bg-slate-50 border-slate-200 opacity-50 grayscale";
                
                div.className = baseClass + stateClass;
                
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="${isActive ? 'bg-emerald-600 text-white shadow-sm' : 'bg-slate-200 text-slate-500'} font-mono text-xs font-bold px-2 py-0.5 rounded transition-all duration-300">${key}</span>
                        <span class="${isActive ? 'text-emerald-700' : 'text-slate-500'} text-[11px] font-extrabold tracking-wider">${keyDesc}</span>
                    </div>
                    <div class="${isActive ? 'text-slate-800 font-mono font-medium text-sm' : 'text-slate-500 font-mono text-xs italic'} mt-1 break-words">${value}</div>
                `;
                container.appendChild(div);
            });
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            const text = document.getElementById('error-text');
            if (msg) {
                text.textContent = msg;
                box.classList.remove('hidden');
            } else {
                box.classList.add('hidden');
            }
        }

        // Main Logic
        function parseAndRender() {
            showError(null);
            const rawText = document.getElementById('fplInput').value;
            if (!rawText.trim()) {
                renderAll([], [], {});
                return;
            }

            const cleaned = rawText.replace(/\n/g, ' ').replace(/\r/g, '').replace(/\(FPL-/, '-').replace(/\)$/, '');
            
            // Item 10 parsing
            const item10Match = cleaned.match(/-[A-Z0-9]{2,4}\/[A-Z]-([A-Z0-9]+)\/([A-Z0-9]+)/);
            let active10a = [];
            let active10b = [];
            
            if (item10Match) {
                active10a = item10Match[1].match(/(E[1-3]|J[1-7]|M[1-3]|P[1-9]|[A-Z])/g) || [];
                active10b = item10Match[2].match(/(B[1-2]|U[1-2]|V[1-2]|D1|G1|[A-Z])/g) || [];
            } else {
                showError("無法解析 Item 10，請確認 FPL 格式是否正確。 (Failed to parse Item 10)");
            }

            // Item 18 parsing (Filtered to allowlist)
            const item18Pattern = /(PBN|STS|NAV|COM|DAT|SUR|DEP|DEST|DOF|REG|EET|SEL|TYP|CODE|DLE|OPR|ORGN|PER|ALTN|RALT|TALT|RIF|RMK)\/(.*?)(?=\s+(?:PBN|STS|NAV|COM|DAT|SUR|DEP|DEST|DOF|REG|EET|SEL|TYP|CODE|DLE|OPR|ORGN|PER|ALTN|RALT|TALT|RIF|RMK)\/|$)/gs;
            let item18Match;
            let active18Data = {};
            let foundAny18 = false;
            
            const allowedItem18Keys = ['PBN', 'NAV', 'DAT', 'SUR', 'CODE'];

            while ((item18Match = item18Pattern.exec(cleaned)) !== null) {
                const key = item18Match[1];
                if (allowedItem18Keys.includes(key)) {
                    foundAny18 = true;
                    active18Data[key] = item18Match[2].trim();
                }
            }

            if (!foundAny18 && item10Match) {
                showError("未偵測到指定的 Item 18 標籤 (PBN, NAV, DAT, SUR, CODE)。");
            }

            renderAll(active10a, active10b, active18Data);
        }

        function renderAll(t10a, t10b, d18) {
            renderIndicatorPanel(dict10a, 'item10a-grid', t10a, 'sky');
            renderIndicatorPanel(dict10b, 'item10b-grid', t10b, 'indigo');
            
            // Extract and render PBN separately
            const activePBN = (d18['PBN'] || '').match(/.{1,2}/g) || [];
            renderIndicatorPanel(dictPBN, 'pbn-grid', activePBN, 'emerald');

            // Render remaining Item 18 info
            renderPanel18(d18);
        }

        // Event Listeners
        document.getElementById('decodeBtn').addEventListener('click', parseAndRender);
        
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('fplInput').value = '';
            showError(null);
            renderAll([], [], {}); // Render in completely "dimmed/off" state
        });

        // Initial Load
        window.onload = () => {
            renderAll([], [], {});
        };
    </script>
</body>
</html>
