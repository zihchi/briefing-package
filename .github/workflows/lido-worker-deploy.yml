name: Deploy LIDO Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker-lido/**'
      - '.github/workflows/lido-worker-deploy.yml'
  # 允許從 Actions 頁面手動觸發
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy worker + 同步 secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker-lido
          # 這 4 個值會被 wrangler 寫成 Cloudflare 端的 secrets
          secrets: |
            LIDO_BASE_URL
            LIDO_CUSTOMER_ID
            LIDO_AUTH_REALM
            LIDO_DWR_SESSION_ID
        env:
          LIDO_BASE_URL: ${{ secrets.LIDO_BASE_URL }}
          LIDO_CUSTOMER_ID: ${{ secrets.LIDO_CUSTOMER_ID }}
          LIDO_AUTH_REALM: ${{ secrets.LIDO_AUTH_REALM }}
          LIDO_DWR_SESSION_ID: ${{ secrets.LIDO_DWR_SESSION_ID }}
