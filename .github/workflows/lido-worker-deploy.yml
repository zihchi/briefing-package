name: Deploy LIDO Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker-lido/**'
      - '.github/workflows/lido-worker-deploy.yml'
  # 允許從 Actions 頁面手動觸發
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker-lido
          # Secrets (LIDO_*) are already set on the Worker via `wrangler secret put`.
          # We intentionally do NOT re-sync them here: the LIDO_* GitHub secrets are
          # empty, and syncing them aborted every deploy before the code ever shipped.

