name: Deploy Main Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-main-worker.yml'
  # 允許從 Actions 頁面（含手機版 GitHub）手動觸發
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # Secrets（AERODATABOX_KEY、ELB 登入用的值）已用 `wrangler secret put`
          # 設在 briefing-package worker 上；GitHub 端沒存這些值，這裡不重新同步。
