name: Turbli 湍流圖預先抓取

on:
  # 每 6 小時自動跑一次 (UTC 1, 7, 13, 19 ≈ 台北 9, 15, 21, 3)
  schedule:
    - cron: '0 1,7,13,19 * * *'
  # 也可手動觸發
  workflow_dispatch:
  # push 程式改動時順便跑一次（方便部署）
  push:
    paths:
      - 'scripts/generate_charts.py'
      - '.github/workflows/turbli-cache.yml'

# 允許 workflow 把產生的 PNG 推回 repo
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Playwright + Chromium
        run: |
          pip install playwright==1.60.0
          playwright install --with-deps chromium

      - name: Generate charts
        run: python scripts/generate_charts.py --concurrency 4

      - name: Commit & push if charts changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chartcache/
          if git diff --staged --quiet; then
            echo "📭 沒有檔案變動，跳過 commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            git commit -m "chore(chartcache): refresh ${COUNT} turbulence charts [skip ci]"
            git push
            echo "📤 已推送 ${COUNT} 張圖更新"
          fi
