<script>
  // ==========================================
  // 1. 即時 UTC 雙時鐘更新系統
  // ==========================================
  function updateUtcClock() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2, '0');
    const m = String(now.getUTCMinutes()).padStart(2, '0');
    const s = String(now.getUTCSeconds()).padStart(2, '0');
    document.querySelectorAll('.utc-clock').forEach(clock => clock.innerText = `${h}:${m}:${s}`);
  }
  setInterval(updateUtcClock, 1000);
  updateUtcClock();

  // ==========================================
  // 2. 氣象分析核心邏輯 (擷取自原先系統)
  // ==========================================
  function getWeatherEmojis(text) {
    if (!text) return '';
    let emojis = [];
    const tokens = text.split(/\s+/);
    let hasTSWS = false; let hasRA = false; let hasSN = false; let hasGust = false;

    const tsRegex = /^[+-]?(?:VC)?TS(?:RA|SN|GR|GS|DZ|PL)?$|^RETS$/;
    const raRegex = /^[+-]?(?:VC)?(?:SH|TS|FZ)?RA$|^RERA$/;
    const snRegex = /^[+-]?(?:VC)?(?:SH|TS|FZ|BL|DR|MI)?SN$|^RESN$/;

    for (let token of tokens) {
        if (token === 'WS' || /^WS\d{3}\//.test(token) || tsRegex.test(token)) hasTSWS = true;
        if (raRegex.test(token)) hasRA = true;
        if (snRegex.test(token)) hasSN = true;
        if (/G\d{2,}/.test(token) && (token.includes('KT') || token.includes('MPS') || token.includes('KMH'))) hasGust = true;
    }
    if (hasTSWS) emojis.push('🚨');
    if (hasRA) emojis.push('☔️');
    if (hasSN) emojis.push('☃️');
    if (hasGust) emojis.push('⚠️');
    return emojis.join(' ');
  }

  function parseWeatherElements(text, prevVis, prevCeil) {
    let vis = prevVis; let ceil = prevCeil;
    if (/\b(CAVOK|SKC|CLR|NSC)\b/.test(text)) {
        if (/\bCAVOK\b/.test(text)) vis = 10;
        ceil = 99999;
    }
    const metricMatch = text.match(/(?:\s|^)([0-9]{4})(?:NDV)?(?:\s|$)/);
    if (metricMatch) {
        const meters = parseInt(metricMatch[1], 10);
        vis = meters === 9999 ? 10 : meters / 1609.34;
    }
    const smMatch = text.match(/(?:\s|^)(P|M)?(\d+)?\s?(\d+\/\d+)?SM(?:\s|$)/);
    if (smMatch) {
        let val = 0;
        if (smMatch[2]) val += parseInt(smMatch[2], 10);
        if (smMatch[3]) {
            const [num, den] = smMatch[3].split('/');
            val += parseInt(num, 10) / parseInt(den, 10);
        }
        if (val === 0 && smMatch[1] === 'M') val = 0.25;
        if (val === 0 && smMatch[1] === 'P') val = 6.0;
        vis = val;
    }
    const cloudMatches = text.match(/(BKN|OVC|VV)(\d{3})/g);
    if (cloudMatches) {
        const bases = cloudMatches.map(c => parseInt(c.slice(3, 6), 10) * 100);
        ceil = Math.min(...bases);
    }
    return { vis, ceil };
  }

  function getFlightCategory(vis, ceil) {
    if (ceil < 500 || vis < 1) return "lifr";
    if (ceil < 1000 || vis < 3) return "ifr";
    if (ceil <= 3000 || vis <= 5) return "mvfr";
    return "vfr";
  }

  function calculateReportAge(rawText) {
    if (!rawText) return "";
    const match = rawText.match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
    if (!match) return "";

    const repDay = parseInt(match[1], 10);
    const repHour = parseInt(match[2], 10);
    const repMin = parseInt(match[3], 10);

    const now = new Date();
    const currDay = now.getUTCDate();
    let targetMonth = now.getUTCMonth();
    let targetYear = now.getUTCFullYear();

    if (repDay > currDay + 5) { // 跨月處理
        targetMonth -= 1;
        if (targetMonth < 0) { targetMonth = 11; targetYear -= 1; }
    }

    const reportDate = new Date(Date.UTC(targetYear, targetMonth, repDay, repHour, repMin));
    const diffMs = now.getTime() - reportDate.getTime();
    const diffMins = Math.max(0, Math.floor(diffMs / 60000));

    if (diffMins < 60) {
        return `(已發佈 ${diffMins} 分鐘)`;
    } else {
        const h = Math.floor(diffMins / 60);
        const m = diffMins % 60;
        return `(已發佈 ${h} 小時 ${m} 分鐘)`;
    }
  }

  function formatColorTAF(rawTaf) {
    if (!rawTaf) return `<div style="background-color: #f8fafc; padding: 12px; border-radius: 6px; text-align: left; border-left: 4px solid #95a5a6;">目前無有效 TAF 報文</div>`;
    const catColors = { vfr: '#2ecc71', mvfr: '#3498db', ifr: '#e74c3c', lifr: '#9b59b6', unk: '#95a5a6' };
    
    const flatTaf = rawTaf.replace(/\s+/g, ' ').trim();
    const markedTaf = flatTaf.replace(/\b(TEMPO|BECMG|FM[0-9]{6}|PROB[0-9]{2})\b/g, '|||$1');
    const lines = markedTaf.split('|||');

    let prevailingVis = 999; let prevailingCeil = 99999;
    let htmlOutput = `<div style="background-color: #f8fafc; padding: 12px; border-radius: 6px; text-align: left;">`;

    lines.forEach((line, index) => {
        const cleanLine = line.trim();
        if (!cleanLine) return;

        let current = parseWeatherElements(cleanLine, prevailingVis, prevailingCeil);
        const cat = getFlightCategory(current.vis, current.ceil);
        const color = catColors[cat];
        const catLabel = cat.toUpperCase();
        
        const emojis = getWeatherEmojis(cleanLine);
        const emojiHtml = emojis ? `<span style="font-size: 13px; margin-right: 6px; vertical-align: middle;">${emojis}</span>` : '';

        if (index === 0 || cleanLine.startsWith('FM') || cleanLine.startsWith('BECMG')) {
            prevailingVis = current.vis; prevailingCeil = current.ceil;
        }

        htmlOutput += `
            <div style="border-left: 4px solid ${color}; padding-left: 10px; margin-bottom: 8px; line-height: 1.6;">
                <span style="display: inline-block; background-color: ${color}; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: ${emojis ? '4px' : '8px'}; vertical-align: middle;">${catLabel}</span>
                ${emojiHtml}
                <span style="font-family: 'Courier New', Courier, monospace; font-size: 13.5px; color: #2c3e50; vertical-align: middle;">${cleanLine}</span>
            </div>
        `;
    });
    htmlOutput += `</div>`;
    return htmlOutput;
  }

  // ==========================================
  // 3. API 擷取與 UI 控制邏輯
  // ==========================================
  function calculateAtisAge(rawText) {
    if (!rawText || rawText.includes("無資料") || rawText.includes("連線失敗") || rawText.includes("等待載入")) return "";
    const timeMatch = rawText.match(/\b(?:\d{2})?(\d{2})(\d{2})Z\b/);
    if (!timeMatch) return "<span class='age-badge' style='background:#f1f5f9; color:#94a3b8;'>(時間戳記未知)</span>";

    const atisHr = parseInt(timeMatch[1], 10);
    const atisMin = parseInt(timeMatch[2], 10);
    const now = new Date();
    const currHr = now.getUTCHours();
    const currMin = now.getUTCMinutes();

    let atisTotalMins = atisHr * 60 + atisMin;
    let currTotalMins = currHr * 60 + currMin;
    if (currTotalMins < atisTotalMins && (atisHr === 23 && currHr === 0)) currTotalMins += 24 * 60;
    const diffMins = currTotalMins - atisTotalMins;

    if (diffMins < 0 || diffMins > 1440) return "<span class='age-badge' style='background:#f1f5f9; color:#94a3b8;'>(時效異常)</span>";
    if (diffMins > 30) return `<span class='age-badge age-expired'>⚠️ 已發佈 ${diffMins} 分鐘 (已過期)</span>`;
    return `<span class='age-badge age-fresh'>✓ 發佈於 ${diffMins} 分鐘前</span>`;
  }

  function quickSelectIcao(selectObj) {
    const icaoInput = document.getElementById("atis-icao-input");
    if (selectObj.value) {
      icaoInput.value = selectObj.value;
      fetchAllData();
      selectObj.selectedIndex = 0;
    }
  }

  function fetchAllData() {
    const icaoInput = document.getElementById("atis-icao-input");
    const icao = icaoInput.value.trim().toUpperCase() || "RCTP";
    icaoInput.value = icao;
    
    // UI 元件
    const statusEl = document.getElementById("atis-status");
    statusEl.innerText = `🔄 正在擷取 ${icao} 資料...`;
    statusEl.style.color = "#3b82f6";
    
    fetchAtisData(icao);
    fetchWeatherData(icao);
  }

  function fetchAtisData(icao) {
    const arrEl = document.getElementById("arr-atis");
    const depEl = document.getElementById("dep-atis");
    const arrAgeEl = document.getElementById("arr-age");
    const depAgeEl = document.getElementById("dep-age");
    const statusEl = document.getElementById("atis-status");

    arrEl.innerText = "連線中..."; depEl.innerText = "連線中...";
    arrAgeEl.innerHTML = ""; depAgeEl.innerHTML = "";

    const gasUrl = "https://script.google.com/macros/s/AKfycbwgSjLlF8GvVbBAdjkBdIQVDBYhdz5WIzbm8K8f4NAY5_s5cH0xxTf9J4Kv1cMceCPzMQ/exec"; 
    
    fetch(`${gasUrl}?icao=${icao}`)
      .then(res => { if (!res.ok) throw new Error("網路狀態異常"); return res.json(); })
      .then(data => {
        if (data.error) {
          statusEl.innerText = `❌ ATIS 擷取失敗: ${data.error}`;
          statusEl.style.color = "#ef4444";
          arrEl.innerText = "無資料"; depEl.innerText = "無資料";
          return;
        }
        
        statusEl.innerText = `✅ ${icao} 資料擷取完畢`;
        statusEl.style.color = "#10b981";
        
        arrEl.innerText = data.arrival || "無 Arrival 資料";
        depEl.innerText = data.departure || "無 Departure 資料";

        arrAgeEl.innerHTML = calculateAtisAge(arrEl.innerText);
        depAgeEl.innerHTML = calculateAtisAge(depEl.innerText);
      })
      .catch(error => {
        statusEl.innerText = `❌ 通訊失敗，請檢查網路連線`;
        statusEl.style.color = "#ef4444";
        arrEl.innerText = "連線失敗"; depEl.innerText = "連線失敗";
      });
  }

  async function fetchWeatherData(icao) {
    const metarContent = document.getElementById("metar-content");
    const metarHeader = document.getElementById("metar-header");
    const metarAge = document.getElementById("metar-age");
    
    const tafContent = document.getElementById("taf-content");
    const tafAge = document.getElementById("taf-age");

    metarContent.innerText = "讀取中...";
    metarContent.className = "raw-text border-unk";
    metarHeader.innerHTML = "METAR (即時天氣)";
    metarAge.innerText = "";
    
    tafContent.innerHTML = `<div style="background-color: #ebedef; padding: 12px; border-radius: 6px; text-align: left; font-family: monospace;">讀取中...</div>`;
    tafAge.innerText = "";

    try {
        // 並行取得 METAR & TAF (AviationWeather API 支援直接存取，無須代理)
        const [metarRes, tafRes] = await Promise.all([
            fetch(`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`),
            fetch(`https://aviationweather.gov/api/data/taf?ids=${icao}&format=json`)
        ]);

        const metarData = await metarRes.json();
        const tafData = await tafRes.json();

        // --- 處理 METAR ---
        let rawMetar = (metarData && metarData.length > 0) ? metarData[0].rawOb : "";
        if (rawMetar) {
            const metarState = parseWeatherElements(rawMetar, 999, 99999);
            const metarCat = getFlightCategory(metarState.vis, metarState.ceil);
            const displayCat = metarCat.toUpperCase();
            const emojis = getWeatherEmojis(rawMetar);
            const emojiHtml = emojis ? `<span style="font-size: 15px; margin-left: 6px; vertical-align: middle;">${emojis}</span>` : '';
            
            metarContent.innerText = rawMetar;
            metarContent.className = `raw-text border-${metarCat}`;
            metarHeader.innerHTML = `METAR (即時天氣) <span class="badge bg-${metarCat}">${displayCat}</span>${emojiHtml}`;
            metarAge.innerText = calculateReportAge(rawMetar);
        } else {
            metarContent.innerText = "目前無有效 METAR 報文";
        }

        // --- 處理 TAF ---
        let rawTaf = (tafData && tafData.length > 0) ? tafData[0].rawTAF : "";
        if (rawTaf) {
            tafContent.innerHTML = formatColorTAF(rawTaf);
            tafAge.innerText = calculateReportAge(rawTaf);
        } else {
            tafContent.innerHTML = formatColorTAF(""); 
        }

    } catch (error) {
        console.error("氣象資料讀取失敗:", error);
        metarContent.innerText = "讀取失敗";
        tafContent.innerHTML = formatColorTAF("");
    }
  }

  // 初始載入自動查詢
  fetchAllData();
</script>
