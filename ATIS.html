<div class="app-wrapper animate-fade-in" style="max-width: 900px;">
  
  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
    <div>
      <h2 style="margin: 0; font-size: 1.5em; color: #333; display: flex; align-items: center; gap: 8px;">
        📻 D-ATIS
      </h2>
      <div style="font-size: 0.9em; color: #888; margin-top: 4px;">Source: https://atis.guru/</div>
    </div>
    
    <button class="app-header-btn" onclick="closePanel()" title="關閉面板">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <div class="app-card" style="padding: 20px; display: flex; flex-direction: column; gap: 12px;">
    <div style="display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap;">
      
      <div style="flex: 1.5; min-width: 250px;">
        <select id="quickIcaoSelect" onchange="quickSelectIcao(this)" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 12px; font-size: 1em; background: rgba(243,244,246,0.8); outline: none; cursor: pointer; color: #333; font-weight: 500;">
          <option selected disabled>-- 常用機場快速選取 --</option>
          <optgroup label="台灣、香港、澳門">
            <option value="RCTP">RCTP 桃園</option>
            <option value="RCSS">RCSS 松山</option>
            <option value="RCKH">RCKH 高雄</option>
            <option value="VHHH">VHHH 香港</option>
            <option value="VMMC">VMMC 澳門</option>
          </optgroup>
          <optgroup label="日本">
            <option value="RJAA">RJAA 成田</option>
            <option value="RJTT">RJTT 羽田</option>
            <option value="RJBB">RJBB 關西</option>
            <option value="RJCC">RJCC 新千歲</option>
            <option value="RJFF">RJFF 福岡</option>
            <option value="ROAH">ROAH 沖繩</option>
            <option value="RJGG">RJGG 中部</option>
          </optgroup>
          <optgroup label="東南亞與其他">
            <option value="WSSS">WSSS 新加坡</option>
            <option value="WMKK">WMKK 吉隆坡</option>
            <option value="VTBS">VTBS 曼谷</option>
            <option value="VVTS">VVTS 胡志明</option>
            <option value="RPLL">RPLL 馬尼拉</option>
          </optgroup>
        </select>
      </div>

      <div style="flex: 1; min-width: 200px; display: flex; gap: 8px;">
        <div style="flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(243,244,246,0.8); border-radius: 12px; padding: 0 12px; border: 1px solid #e5e7eb;">
          <span style="font-weight: bold; color: #555;">ICAO:</span>
          <input type="text" id="atis-icao-input" value="RCTP" maxlength="4" placeholder="ICAO" 
                 style="background: transparent; border: none; font-size: 1.1em; font-weight: bold; color: #3c79ff; text-transform: uppercase; width: 100%; outline: none; font-family: 'Courier New', Courier, monospace;">
        </div>
        <button onclick="fetchGlobalAtis()" style="background-color: #3c79ff; color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;">查詢</button>
      </div>
    </div>
    
    <div id="atis-status" style="font-size: 0.9em; font-weight: bold; color: #64748b; text-align: center;">
      請輸入代碼後查詢
    </div>
  </div>

  <div class="atis-grid-container">
    
    <div class="app-card atis-sub-card">
      <div class="app-section-title atis-title-bar">
        <div>
            <span style="color: #3c79ff; font-size: 1.1em;">Arrival ATIS</span>
            <span class="atis-clock-display">(Time Now : <span class="utc-clock">00:00:00</span>z)</span>
        </div>
        <div id="arr-age"></div> </div>
      <div id="arr-atis" class="raw-text atis-content-box" style="border-left-color: #3c79ff;">等待載入...</div>
    </div>

    <div class="app-card atis-sub-card">
      <div class="app-section-title atis-title-bar">
        <div>
            <span style="color: #e67e22; font-size: 1.1em;">Departure ATIS</span>
            <span class="atis-clock-display">(Time Now : <span class="utc-clock">00:00:00</span>z)</span>
        </div>
        <div id="dep-age"></div> </div>
      <div id="dep-atis" class="raw-text atis-content-box" style="border-left-color: #e67e22;">等待載入...</div>
    </div>

  </div>

</div>

<style>
  .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  /* 報文左右對稱分格佈局 */
  .atis-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: stretch; }
  .atis-sub-card { margin-bottom: 0 !important; display: flex; flex-direction: column; padding: 15px; }
  
  /* 標題列佈局 (包含時鐘與徽章) */
  .atis-title-bar {
      display: flex; 
      justify-content: space-between; 
      align-items: flex-end; 
      flex-wrap: wrap; 
      gap: 10px; 
      margin-bottom: 12px;
  }
  .atis-clock-display {
      font-size: 0.85em; 
      color: #64748b; 
      font-family: 'Courier New', monospace; 
      font-weight: bold; 
      margin-left: 8px;
  }

  .atis-content-box {
      flex-grow: 1;
      font-size: 14.5px; 
      line-height: 1.6; 
      white-space: pre-wrap; 
      word-break: break-word;
      background-color: #f8fafc;
      min-height: 250px; 
      border-left: 4px solid #ddd;
      padding: 12px;
      border-radius: 8px;
  }

  /* 時效性徽章樣式 */
  .age-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8em; font-weight: bold; letter-spacing: 0.5px; }
  .age-fresh { background-color: #dcfce7; color: #10b981; }
  .age-expired { background-color: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; }

  @media (max-width: 768px) {
      .atis-grid-container { grid-template-columns: 1fr; }
  }
</style>

<script>
  // ==========================================
  // 1. 即時 UTC 雙時鐘更新系統
  // ==========================================
  function updateUtcClock() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2, '0');
    const m = String(now.getUTCMinutes()).padStart(2, '0');
    const s = String(now.getUTCSeconds()).padStart(2, '0');
    
    // 更新畫面上所有掛載 .utc-clock 的元素
    document.querySelectorAll('.utc-clock').forEach(clock => {
        clock.innerText = `${h}:${m}:${s}`;
    });
  }
  setInterval(updateUtcClock, 1000);
  updateUtcClock();

  // ==========================================
  // 2. ATIS 報文時效性解析引擎 (Time Stamp Parser)
  // ==========================================
  function calculateAtisAge(rawText) {
    if (!rawText || rawText.includes("無資料") || rawText.includes("連線失敗") || rawText.includes("等待載入")) {
        return "";
    }

    // 利用正規表達式捕捉標準航空氣象格式：DDHHMMZ 或 HHMMZ
    // 擷取 Z 結尾前 4 碼作為 (時)(分)
    const timeMatch = rawText.match(/\b(?:\d{2})?(\d{2})(\d{2})Z\b/);
    if (!timeMatch) {
        return "<span class='age-badge' style='background:#f1f5f9; color:#94a3b8;'>(時間戳記未知)</span>";
    }

    const atisHr = parseInt(timeMatch[1], 10);
    const atisMin = parseInt(timeMatch[2], 10);

    const now = new Date();
    const currHr = now.getUTCHours();
    const currMin = now.getUTCMinutes();

    let atisTotalMins = atisHr * 60 + atisMin;
    let currTotalMins = currHr * 60 + currMin;

    // 處理跨日邏輯 (例如 ATIS 是 23:50Z 發佈，現在是 00:10Z)
    if (currTotalMins < atisTotalMins && (atisHr === 23 && currHr === 0)) {
        currTotalMins += 24 * 60;
    }

    const diffMins = currTotalMins - atisTotalMins;

    // 異常處理 (例如未來時間，或相差過大)
    if (diffMins < 0 || diffMins > 1440) {
        return "<span class='age-badge' style='background:#f1f5f9; color:#94a3b8;'>(時效異常)</span>";
    }

    // 業務邏輯：大於 30 分鐘標示為已過期
    if (diffMins > 30) {
        return `<span class='age-badge age-expired'>⚠️ 已發佈 ${diffMins} 分鐘 (已過期)</span>`;
    } else {
        return `<span class='age-badge age-fresh'>✓ 發佈於 ${diffMins} 分鐘前</span>`;
    }
  }

  // ==========================================
  // 3. API 擷取與 UI 控制邏輯
  // ==========================================
  function quickSelectIcao(selectObj) {
    const icaoInput = document.getElementById("atis-icao-input");
    if (selectObj.value) {
      icaoInput.value = selectObj.value;
      fetchGlobalAtis();
      selectObj.selectedIndex = 0;
    }
  }

  function fetchGlobalAtis() {
    const icaoInput = document.getElementById("atis-icao-input");
    const icao = icaoInput.value.trim().toUpperCase() || "RCTP";
    icaoInput.value = icao;
    
    const statusEl = document.getElementById("atis-status");
    const arrEl = document.getElementById("arr-atis");
    const depEl = document.getElementById("dep-atis");
    const arrAgeEl = document.getElementById("arr-age");
    const depAgeEl = document.getElementById("dep-age");

    // UI 切換至載入狀態
    statusEl.innerText = `🔄 正在擷取 ${icao} 數位電文...`;
    statusEl.style.color = "#3b82f6";
    arrEl.innerText = "連線中...";
    depEl.innerText = "連線中...";
    arrAgeEl.innerHTML = "";
    depAgeEl.innerHTML = "";

    const gasUrl = "https://script.google.com/macros/s/AKfycbwgSjLlF8GvVbBAdjkBdIQVDBYhdz5WIzbm8K8f4NAY5_s5cH0xxTf9J4Kv1cMceCPzMQ/exec"; 
    
    fetch(`${gasUrl}?icao=${icao}`)
      .then(response => {
        if (!response.ok) throw new Error("網路狀態異常");
        return response.json();
      })
      .then(data => {
        if (data.error) {
          statusEl.innerText = `❌ ${data.error}`;
          statusEl.style.color = "#ef4444";
          arrEl.innerText = "無資料";
          depEl.innerText = "無資料";
          return;
        }

        const now = new Date();
        const fetchZ = `${String(now.getUTCHours()).padStart(2,'0')}${String(now.getUTCMinutes()).padStart(2,'0')}Z`;
        
        statusEl.innerText = `✅ ${icao} 資料擷取完畢 (擷取時間: ${fetchZ})`;
        statusEl.style.color = "#10b981";
        
        arrEl.innerText = data.arrival || "無 Arrival 資料";
        depEl.innerText = data.departure || "無 Departure 資料";

        // 計算並渲染時效徽章
        arrAgeEl.innerHTML = calculateAtisAge(arrEl.innerText);
        depAgeEl.innerHTML = calculateAtisAge(depEl.innerText);
      })
      .catch(error => {
        statusEl.innerText = `❌ 通訊失敗，請檢查網路連線`;
        statusEl.style.color = "#ef4444";
        arrEl.innerText = "連線失敗";
        depEl.innerText = "連線失敗";
        arrAgeEl.innerHTML = "";
        depAgeEl.innerHTML = "";
      });
  }

  // 初始載入自動查詢
  fetchGlobalAtis();
</script>
