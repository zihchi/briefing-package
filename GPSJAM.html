<div class="section gpsjam-section" style="margin: 0 auto;">
  <h2>📡 GPSJAM 即時干擾地圖</h2>
  
  <iframe id="gpsjamMap" 
    style="width:100%;height:600px;border:none;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);" 
    allowfullscreen>
  </iframe>
</div>

<script>
  // 啟動程序：動態推算日期與載入地圖
  (function() {
    // 設定與 Windy 同步的參數 (以台灣為中心)
    const lat = "25.07970";
    const lon = "121.23420";
    const zoom = "7.0";

    // 計算兩天前的日期 (解決 GPSJAM 資料處理延遲問題)
    let d = new Date();
    d.setDate(d.getDate() - 2);
    let targetDate = d.toISOString().split('T')[0]; // 格式化為 YYYY-MM-DD

    // 注入網址
    const iframe = document.getElementById("gpsjamMap");
    if(iframe) {
        iframe.src = `https://gpsjam.org/?lat=${lat}&lon=${lon}&z=${zoom}&date=${targetDate}`;
    }
  })();
</script>
