<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛航員任務換班單 - 完美疊加版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
            background-color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .panel {
            background: #ffffff;
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #16a085;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upload-area {
            background: #e8f8f5;
            border: 2px dashed #1abc9c;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .upload-area input[type="file"] {
            font-size: 16px;
            margin-top: 15px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        
        input[type="text"], input[type="date"], select {
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
        }
        select { cursor: pointer; }
        
        /* 拆分輸入框專用排版 */
        .flex-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .flex-row select { width: 100px; flex-shrink: 0; }
        .flex-row input { flex-grow: 1; }
        
        .duty-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .duty-row input[type="date"] { width: 140px; flex-shrink: 0; cursor: pointer; }
        .duty-row input[type="text"] { flex-grow: 1; }

        .btn-small {
            background-color: #34495e;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 5px;
        }
        .btn-small:hover { background-color: #2c3e50; }

        button.main-btn {
            background-color: #e67e22;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
            grid-column: span 2;
        }
        button.main-btn:hover { background-color: #d35400; }
        button.main-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* PDF 疊加預覽區 */
        #export-wrapper {
            position: relative;
            width: 1122px; 
            height: 793px;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            display: none; 
            overflow: hidden;
        }
        #pdf-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .text-overlay {
            position: absolute;
            color: #000000; 
            font-size: 16px; /* 預設固定為 16px，可由拉桿即時修改 */
            font-weight: bold;
            z-index: 2;
            white-space: pre-wrap;
            text-align: left;
            cursor: move; 
            padding: 2px 5px;
            border: 2px dashed transparent;
            border-radius: 4px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .text-overlay:hover, .text-overlay:active {
            border-color: rgba(52, 152, 219, 0.8);
            background-color: rgba(52, 152, 219, 0.1);
        }
    </style>
</head>
<body>

    <div class="panel">
        <div class="header-title">第一步：載入原版換班單 PDF</div>
        <div class="upload-area" id="status-area">
            <label id="status-msg">系統正在嘗試自動從 GitHub 載入 PDF 底圖...</label>
            <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
        </div>

        <div class="header-title">
            第二步：輸入換班資訊與設定
            <!-- 字體大小調整拉桿回歸 -->
            <div style="font-size: 14px; font-weight: normal; color: #333; display: flex; align-items: center; gap: 10px;">
                <label style="margin: 0;">字體大小 (Font Size):</label>
                <input type="range" id="font-size-ctrl" min="12" max="36" value="16" step="1" oninput="updateFontSize()">
                <span id="font-size-display">16px</span>
            </div>
        </div>
        
        <div class="controls-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label>填寫日期 (Date)</label>
                <!-- 日期選擇器 -->
                <input type="date" id="in-header-date" onchange="syncText()" style="width: 200px;">
            </div>
            
            <div class="form-group">
                <label>Crew A</label>
                <!-- Crew A 機隊/員編/姓名 分開輸入 -->
                <div class="flex-row">
                    <select id="in-a-fleet" onchange="syncText()">
                        <option value="A330" selected>A330</option>
                        <option value="A321">A321</option>
                        <option value="A350">A350</option>
                    </select>
                    <input type="text" id="in-a-id" placeholder="員編" oninput="syncText()">
                    <input type="text" id="in-a-name" placeholder="姓名" oninput="syncText()">
                </div>
                
                <label style="margin-top: 10px;">Crew A - 換班前勤務</label>
                <div class="duty-row">
                    <input type="date" id="in-a-duty-date-1" onchange="syncDutyDate(1)">
                    <input type="text" id="in-a-duty-text-1" placeholder="勤務 1" oninput="syncText()">
                </div>
                <div class="duty-row">
                    <input type="date" id="in-a-duty-date-2" onchange="syncDutyDate(2)">
                    <input type="text" id="in-a-duty-text-2" placeholder="勤務 2" oninput="syncText()">
                </div>
                <div class="duty-row">
                    <input type="date" id="in-a-duty-date-3" onchange="syncDutyDate(3)">
                    <input type="text" id="in-a-duty-text-3" placeholder="勤務 3" oninput="syncText()">
                </div>
                <div class="duty-row">
                    <input type="date" id="in-a-duty-date-4" onchange="syncDutyDate(4)">
                    <input type="text" id="in-a-duty-text-4" placeholder="勤務 4" oninput="syncText()">
                </div>
            </div>

            <div class="form-group">
                <label>Crew B</label>
                <!-- Crew B 機隊/員編/姓名 分開輸入 -->
                <div class="flex-row">
                    <select id="in-b-fleet" onchange="syncText()">
                        <option value="A330" selected>A330</option>
                        <option value="A321">A321</option>
                        <option value="A350">A350</option>
                    </select>
                    <input type="text" id="in-b-id" placeholder="員編" oninput="syncText()">
                    <input type="text" id="in-b-name" placeholder="姓名" oninput="syncText()">
                </div>
                
                <label style="margin-top: 10px;">Crew B - 換班前勤務</label>
                <div class="duty-row">
                    <input type="date" id="in-b-duty-date-1" onchange="syncText()">
                    <input type="text" id="in-b-duty-text-1" placeholder="勤務 1" oninput="syncText()">
                </div>
                <div class="duty-row">
                    <input type="date" id="in-b-duty-date-2" onchange="syncText()">
                    <input type="text" id="in-b-duty-text-2" placeholder="勤務 2" oninput="syncText()">
                </div>
                <div class="duty-row">
                    <input type="date" id="in-b-duty-date-3" onchange="syncText()">
                    <input type="text" id="in-b-duty-text-3" placeholder="勤務 3" oninput="syncText()">
                </div>
                <div class="duty-row">
                    <input type="date" id="in-b-duty-date-4" onchange="syncText()">
                    <input type="text" id="in-b-duty-text-4" placeholder="勤務 4" oninput="syncText()">
                </div>
            </div>

            <button id="download-btn" class="main-btn" onclick="exportPDF()" disabled>請稍候，PDF 載入中...</button>
        </div>
    </div>

    <!-- 合成區塊 (底圖 Canvas + 上層黑字) -->
    <div id="export-wrapper">
        <canvas id="pdf-canvas"></canvas>
        
        <!-- 獨立的三個日期疊加層 -->
        <div id="out-date-y" class="text-overlay"></div>
        <div id="out-date-m" class="text-overlay"></div>
        <div id="out-date-d" class="text-overlay"></div>
        
        <div id="out-a-info" class="text-overlay"></div>
        <div id="out-a-duty-1" class="text-overlay"></div>
        <div id="out-a-duty-2" class="text-overlay"></div>
        <div id="out-a-duty-3" class="text-overlay"></div>
        <div id="out-a-duty-4" class="text-overlay"></div>
        
        <div id="out-b-info" class="text-overlay"></div>
        <div id="out-b-duty-1" class="text-overlay"></div>
        <div id="out-b-duty-2" class="text-overlay"></div>
        <div id="out-b-duty-3" class="text-overlay"></div>
        <div id="out-b-duty-4" class="text-overlay"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const wrapper = document.getElementById('export-wrapper');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('download-btn');
        const statusArea = document.getElementById('status-area');
        const statusMsg = document.getElementById('status-msg');
        const uploadInput = document.getElementById('pdf-upload');

        // 系統啟動時，自動帶入當日日期至所有日期欄位
        function setupDynamicDefaults() {
            const today = new Date();
            // 轉換為 YYYY-MM-DD 給 input type="date" 使用
            const localDateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

            document.getElementById('in-header-date').value = localDateStr;

            for (let i = 1; i <= 4; i++) {
                document.getElementById(`in-a-duty-date-${i}`).value = localDateStr;
                document.getElementById(`in-b-duty-date-${i}`).value = localDateStr;
            }
        }

        setupDynamicDefaults();

        const rawFileName = 'SwapDutyForm.pdf';
        const pdfUrl = encodeURI('./' + rawFileName);

        fetch(pdfUrl)
            .then(response => {
                if (!response.ok) throw new Error('找不到檔案');
                return response.arrayBuffer();
            })
            .then(buffer => pdfjsLib.getDocument(buffer).promise)
            .then(pdf => renderPDF(pdf))
            .catch(error => enableManualUpload());

        function enableManualUpload() {
            statusMsg.innerHTML = '<span style="color: #c0392b;">⚠️ 自動載入失敗。<br>請點擊下方按鈕手動上傳 <b>' + rawFileName + '</b></span>';
            uploadInput.style.display = 'block';
            downloadBtn.innerText = '請先上傳 PDF 後，再點此下載合成檔案';
            
            uploadInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') return;

                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => renderPDF(pdf));
                };
                fileReader.readAsArrayBuffer(file);
            });
        }

        function renderPDF(pdf) {
            pdf.getPage(1).then(page => {
                const scale = 3; 
                const viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    wrapper.style.display = 'block';
                    statusMsg.innerHTML = '<span style="color: #27ae60;">✅ PDF 底圖載入成功！請開始填寫下方資訊。</span>';
                    uploadInput.style.display = 'none'; 
                    downloadBtn.disabled = false;
                    downloadBtn.innerText = '一鍵下載完美合成版 PDF';
                    downloadBtn.style.backgroundColor = '#e74c3c';
                    
                    initDragPositions();
                    syncText();
                    updateFontSize(); // 初始化字體大小
                });
            });
        }

        // 動態調整所有疊加文字的大小
        function updateFontSize() {
            const size = document.getElementById('font-size-ctrl').value;
            document.getElementById('font-size-display').innerText = size + 'px';
            document.querySelectorAll('.text-overlay').forEach(el => {
                el.style.fontSize = size + 'px';
            });
        }

        // 當 Crew A 選擇日期時，自動同步 Crew B 對應的勤務日期
        function syncDutyDate(index) {
            const dateVal = document.getElementById('in-a-duty-date-' + index).value;
            document.getElementById('in-b-duty-date-' + index).value = dateVal;
            syncText();
        }

        // 輔助函數：格式化人員資訊 (機隊/員編/姓名)
        function formatInfo(fleetId, idId, nameId) {
            const f = document.getElementById(fleetId).value;
            const i = document.getElementById(idId).value;
            const n = document.getElementById(nameId).value;
            // 若員編與姓名皆為空，則不顯示文字，避免畫面上出現預設的 "A330//"
            if (!i.trim() && !n.trim()) return '';
            return `${f}/${i}/${n}`;
        }

        // 輔助函數：格式化勤務內容 (YYYY/MM/DD 勤務)
        function formatDuty(dateId, textId) {
            const d = document.getElementById(dateId).value;
            const t = document.getElementById(textId).value;
            // 若勤務未填寫，則不顯示，避免畫面上憑空出現孤單的日期
            if (!t.trim()) return '';
            // 將原先 YYYY-MM-DD 的格式轉換為 YYYY/MM/DD 以便閱讀
            const formattedDate = d ? d.replace(/-/g, '/') + ' ' : '';
            return formattedDate + t;
        }

        // 同步文字：負責將分開輸入的資料組裝後放上 PDF
        function syncText() {
            // 處理頂部審核日期
            const headerDate = document.getElementById('in-header-date').value;
            if(headerDate) {
                const parts = headerDate.split('-');
                document.getElementById('out-date-y').innerText = parts[0];
                document.getElementById('out-date-m').innerText = parts[1];
                document.getElementById('out-date-d').innerText = parts[2];
            } else {
                document.getElementById('out-date-y').innerText = '';
                document.getElementById('out-date-m').innerText = '';
                document.getElementById('out-date-d').innerText = '';
            }
            
            // 處理 Crew Info
            document.getElementById('out-a-info').innerText = formatInfo('in-a-fleet', 'in-a-id', 'in-a-name');
            document.getElementById('out-b-info').innerText = formatInfo('in-b-fleet', 'in-b-id', 'in-b-name');
            
            // 處理 Duties
            for(let i=1; i<=4; i++) {
                document.getElementById('out-a-duty-'+i).innerText = formatDuty('in-a-duty-date-'+i, 'in-a-duty-text-'+i);
                document.getElementById('out-b-duty-'+i).innerText = formatDuty('in-b-duty-date-'+i, 'in-b-duty-text-'+i);
            }
        }

        // 載入使用者指定的絕對座標
        function initDragPositions() {
            const overlays = [
                { id: 'out-date-y', top: '70px', left: '933px' },
                { id: 'out-date-m', top: '70px', left: '991px' }, 
                { id: 'out-date-d', top: '70px', left: '1033px' },
                
                { id: 'out-a-info', top: '223px', left: '214px' },
                { id: 'out-a-duty-1', top: '176px', left: '516px' },
                { id: 'out-a-duty-2', top: '206px', left: '516px' },
                { id: 'out-a-duty-3', top: '236px', left: '516px' },
                { id: 'out-a-duty-4', top: '266px', left: '516px' },
                
                { id: 'out-b-info', top: '354px', left: '214px' },
                { id: 'out-b-duty-1', top: '306px', left: '516px' },
                { id: 'out-b-duty-2', top: '336px', left: '516px' },
                { id: 'out-b-duty-3', top: '366px', left: '516px' },
                { id: 'out-b-duty-4', top: '396px', left: '516px' }
            ];

            overlays.forEach(item => {
                const el = document.getElementById(item.id);
                if (!el.style.top || !el.style.top.includes('px')) {
                    el.style.top = item.top;
                    el.style.left = item.left;
                }
                makeDraggable(el);
            });
        }

        function makeDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            elmnt.onmousedown = dragMouseDown;
            elmnt.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                if (e.cancelable) e.preventDefault(); 
                if (e.type === 'touchstart') {
                    pos3 = e.touches[0].clientX;
                    pos4 = e.touches[0].clientY;
                } else {
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                }
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                if (e.cancelable) e.preventDefault();
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        function exportPDF() {
            const element = document.getElementById('export-wrapper');
            
            // --- 新增自動命名邏輯 ---
            // 1. 取得填寫的日期並移除 '-' (例如 2026-04-19 變成 20260419)
            const rawDate = document.getElementById('in-header-date').value;
            const dateStr = rawDate ? rawDate.replace(/-/g, '') : '';
            
            // 2. 取得 Crew A 姓名 (若未填寫則給予預設防呆名稱)
            const crewAName = document.getElementById('in-a-name').value.trim() || '未具名';
            
            // 3. 組合出最終的完美檔名
            const dynamicFileName = `${dateStr}${crewAName}換班單.pdf`;
            
            const opt = {
                margin: 0,
                filename: dynamicFileName,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
