<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 針對 iOS 優化：加入 maximum-scale=1.0, user-scalable=0 鎖定縮放，防止誤觸放大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>飛航員任務換班單 - iOS 優化疊加版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: "-apple-system", "BlinkMacSystemFont", "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: #2c3e50;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .panel {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            overflow-x: hidden; /* 雙重防線：禁止面板發生水平溢出 */
        }
        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #16a085;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .upload-area {
            background: #e8f8f5;
            border: 2px dashed #1abc9c;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .upload-area input[type="file"] {
            font-size: 16px;
            margin-top: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        
        /* 響應式網格設計：手機單欄，平板/桌面雙欄 */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
        }
        @media (min-width: 800px) {
            .controls-grid { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); } 
        }
        
        .full-width { grid-column: 1 / -1; }
        
        .form-group { 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
        }

        /* 👑 新增：Crew A 與 Crew B 的獨立底色視覺設計 */
        .crew-a-card {
            background-color: #f0fbf6; /* 柔和的薄荷綠底色 */
            border: 2px solid #2ecc71;
            padding: 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(46, 204, 113, 0.1);
        }
        .crew-b-card {
            background-color: #fef9f4; /* 柔和的暖橘色底色 */
            border: 2px solid #f39c12;
            padding: 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(243, 156, 18, 0.1);
        }
        .crew-card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        label { font-size: 15px; font-weight: bold; margin-bottom: 6px; color: #2c3e50; }
        
        input[type="text"], input[type="date"], select {
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px; 
            font-family: inherit;
            background-color: #fcfcfc;
            box-sizing: border-box;
            width: 100%;
        }
        select { cursor: pointer; appearance: auto; }
        
        /* 響應式拆分輸入框 */
        .crew-info-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            width: 100%;
        }
        @media (min-width: 600px) {
            .crew-info-group { flex-direction: row; }
            .crew-info-group select { width: 100px; flex-shrink: 0; } 
            .crew-info-group input { flex-grow: 1; min-width: 0; } 
        }
        
        .duty-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.6); /* 微調透明度以適應新底色 */
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        @media (min-width: 600px) {
            .duty-row { flex-direction: row; background: transparent; padding: 0; }
            .duty-row input[type="date"] { width: 140px; flex-shrink: 0; }
            .duty-row input[type="text"] { flex-grow: 1; min-width: 0; } 
        }

        .date-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .date-inputs input { width: 100%; text-align: center; }

        /* 簽名區塊排版 */
        .signature-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }
        @media (min-width: 768px) {
            .signature-container { flex-direction: row; }
        }
        
        .signature-pad-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0; 
        }
        
        /* 👑 升級：大幅增加簽名板高度 */
        canvas.sig-pad {
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            background: #fdfdfd;
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            height: 250px; /* 從 140px 擴展至 250px，增加手指繪圖腹地 */
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-small {
            background-color: #34495e;
            color: white;
            padding: 12px 15px; 
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 5px;
        }
        .btn-small:hover { background-color: #2c3e50; }
        .btn-clear { background-color: #e74c3c; margin-top: 0; font-weight: bold; }
        .btn-clear:hover { background-color: #c0392b; }

        button.main-btn {
            background-color: #e67e22;
            color: white;
            padding: 18px; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button.main-btn:hover { background-color: #d35400; transform: translateY(-2px); }
        button.main-btn:active { transform: translateY(0); }
        button.main-btn:disabled { background-color: #95a5a6; cursor: not-allowed; box-shadow: none; transform: none; }

        /* 預覽容器 */
        .preview-container {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; 
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            background: #e4e5e6;
            margin-top: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .scroll-hint {
            text-align: center;
            color: #e67e22;
            font-weight: bold;
            font-size: 15px;
            margin: 10px 0;
            display: none;
            animation: pulse 2s infinite;
        }
        @media (max-width: 1150px) {
            .scroll-hint { display: block; }
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        #export-wrapper {
            position: relative;
            width: 1122px; 
            height: 793px;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            display: none; 
            overflow: hidden;
            margin: 0 auto;
        }
        
        #pdf-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: contain;
            pointer-events: none; 
        }
        
        .text-overlay {
            position: absolute;
            color: #000000; 
            font-size: 14px; /* 預設改為 14px */
            font-weight: bold;
            z-index: 2;
            white-space: pre-wrap;
            text-align: left;
            cursor: move; 
            padding: 6px; 
            border: 2px dashed transparent;
            border-radius: 4px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .text-overlay:hover, .text-overlay:active {
            border-color: rgba(52, 152, 219, 0.8);
            background-color: rgba(52, 152, 219, 0.15);
        }
        
        /* 特別鎖定日期字級，不隨設定變動 */
        #out-date-y, #out-date-m, #out-date-d {
            font-size: 14px !important;
        }

        .sig-overlay {
            position: absolute;
            z-index: 2;
            cursor: move;
            border: 2px dashed transparent;
            border-radius: 4px;
            transition: background-color 0.2s, border-color 0.2s;
            height: 70px; /* 預設改為 70px */
            padding: 4px;
        }
        .sig-overlay:hover, .sig-overlay:active {
            border-color: rgba(46, 204, 113, 0.8);
            background-color: rgba(46, 204, 113, 0.15);
        }
        
        .tweak-area {
            background: #fdf2e9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e67e22;
            text-align: center;
            color: #d35400;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
    </style>
</head>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const wrapper = document.getElementById('export-wrapper');
        const downloadBtn = document.getElementById('download-btn');
        const statusArea = document.getElementById('status-area');
        const statusMsg = document.getElementById('status-msg');
        const uploadInput = document.getElementById('pdf-upload');

        function setupDynamicDefaults() {
            const today = new Date();
            const localDateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

            document.getElementById('in-header-date').value = localDateStr;

            for (let i = 1; i <= 4; i++) {
                document.getElementById(`in-a-duty-date-${i}`).value = localDateStr;
                document.getElementById(`in-b-duty-date-${i}`).value = localDateStr;
            }
        }

        setupDynamicDefaults();

        const rawFileName = 'SwapDutyForm.pdf'; 
        const pdfUrl = encodeURI('./' + rawFileName);

        fetch(pdfUrl)
            .then(response => {
                if (!response.ok) throw new Error('找不到檔案');
                return response.arrayBuffer();
            })
            .then(buffer => pdfjsLib.getDocument(buffer).promise)
            .then(pdf => renderPDF(pdf))
            .catch(error => enableManualUpload());

        function enableManualUpload() {
            statusMsg.innerHTML = '<span style="color: #c0392b;">⚠️ 自動載入失敗。<br>請點擊下方按鈕手動上傳您的原始 PDF 底圖</span>';
            uploadInput.style.display = 'block';
            downloadBtn.innerText = '請先上傳 PDF 後，再點此下載合成檔案';
            
            uploadInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') return;

                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => renderPDF(pdf));
                };
                fileReader.readAsArrayBuffer(file);
            });
        }

        function renderPDF(pdf) {
            pdf.getPage(1).then(page => {
                const scale = 3; 
                const viewport = page.getViewport({scale: scale});
                
                const offScreenCanvas = document.createElement('canvas');
                const ctx = offScreenCanvas.getContext('2d');
                offScreenCanvas.height = viewport.height;
                offScreenCanvas.width = viewport.width;

                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, offScreenCanvas.width, offScreenCanvas.height);

                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    const imgUrl = offScreenCanvas.toDataURL('image/jpeg', 0.98);
                    const bgImg = document.getElementById('pdf-bg-img');
                    
                    bgImg.onload = function() {
                        wrapper.style.display = 'block';
                        statusMsg.innerHTML = '<span style="color: #27ae60;">✅ PDF 底圖載入成功！請開始填寫下方資訊。</span>';
                        uploadInput.style.display = 'none'; 
                        downloadBtn.disabled = false;
                        downloadBtn.innerText = '一鍵下載完美合成版 PDF';
                        downloadBtn.style.backgroundColor = '#e74c3c';
                        
                        initDragPositions();
                        syncText();
                        updateFontSize();
                        updateSigSize(); 
                        initSignaturePads(); 
                    };
                    
                    bgImg.src = imgUrl;
                });
            });
        }

        function syncDutyDate(index) {
            const dateVal = document.getElementById('in-a-duty-date-' + index).value;
            document.getElementById('in-b-duty-date-' + index).value = dateVal;
            syncText();
        }

        function formatInfo(fleetId, idId, nameId) {
            const f = document.getElementById(fleetId).value;
            const i = document.getElementById(idId).value;
            const n = document.getElementById(nameId).value;
            if (!i.trim() && !n.trim()) return '';
            return `${f}/${i}/${n}`;
        }

        function formatDuty(dateId, textId) {
            const d = document.getElementById(dateId).value;
            const t = document.getElementById(textId).value;
            if (!t.trim()) return '';
            const formattedDate = d ? d.replace(/-/g, '/') + ' ' : '';
            return formattedDate + t;
        }

        function syncText() {
            const headerDate = document.getElementById('in-header-date').value;
            if(headerDate) {
                const parts = headerDate.split('-');
                document.getElementById('out-date-y').innerText = parts[0];
                document.getElementById('out-date-m').innerText = parts[1];
                document.getElementById('out-date-d').innerText = parts[2];
            } else {
                document.getElementById('out-date-y').innerText = '';
                document.getElementById('out-date-m').innerText = '';
                document.getElementById('out-date-d').innerText = '';
            }
            
            document.getElementById('out-a-info').innerText = formatInfo('in-a-fleet', 'in-a-id', 'in-a-name');
            document.getElementById('out-b-info').innerText = formatInfo('in-b-fleet', 'in-b-id', 'in-b-name');
            
            for(let i=1; i<=4; i++) {
                document.getElementById('out-a-duty-'+i).innerText = formatDuty('in-a-duty-date-'+i, 'in-a-duty-text-'+i);
                document.getElementById('out-b-duty-'+i).innerText = formatDuty('in-b-duty-date-'+i, 'in-b-duty-text-'+i);
            }
        }

        function updateFontSize() {
            const size = document.getElementById('font-size-ctrl').value;
            document.getElementById('font-size-display').innerText = size + 'px';
            document.querySelectorAll('.text-overlay').forEach(el => {
                if (['out-date-y', 'out-date-m', 'out-date-d'].includes(el.id)) return;
                el.style.fontSize = size + 'px';
            });
        }

        function updateSigSize() {
            const size = document.getElementById('sig-size-ctrl').value;
            document.getElementById('sig-size-display').innerText = size + 'px';
            document.querySelectorAll('.sig-overlay').forEach(el => {
                el.style.height = size + 'px'; 
            });
        }

        function initSignaturePads() {
            setupSignaturePad('pad-a', 'out-sig-a');
            setupSignaturePad('pad-b', 'out-sig-b');
        }

        function setupSignaturePad(canvasId, overlayId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            function getPointerPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX = e.clientX;
                let clientY = e.clientY;

                if (e.type.includes('touch')) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function startDrawing(e) {
                isDrawing = true;
                const pos = getPointerPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                draw(e);
            }

            function stopDrawing() {
                if (!isDrawing) return;
                isDrawing = false;
                ctx.beginPath();
                syncSignatureToOverlay(canvas, overlayId);
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault(); 
                const pos = getPointerPos(e);
                
                ctx.lineWidth = 4; /* 調整畫筆粗細以配合加大版面 */
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#000000';

                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function syncSignatureToOverlay(canvas, overlayId) {
            const overlay = document.getElementById(overlayId);
            const dataUrl = canvas.toDataURL('image/png');
            overlay.src = dataUrl;
            overlay.style.display = 'block';
        }

        function clearSignature(canvasId, overlayId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const overlay = document.getElementById(overlayId);
            overlay.src = '';
            overlay.style.display = 'none';
        }

        function initDragPositions() {
            const overlays = [
                { id: 'out-date-y', top: '69px', left: '933px' },
                { id: 'out-date-m', top: '69px', left: '990px' }, 
                { id: 'out-date-d', top: '69px', left: '1032px' },
                
                { id: 'out-a-info', top: '219px', left: '216px' },
                { id: 'out-a-duty-1', top: '176px', left: '516px' },
                { id: 'out-a-duty-2', top: '206px', left: '516px' },
                { id: 'out-a-duty-3', top: '236px', left: '516px' },
                { id: 'out-a-duty-4', top: '266px', left: '516px' },
                
                { id: 'out-b-info', top: '351px', left: '215px' },
                { id: 'out-b-duty-1', top: '306px', left: '516px' },
                { id: 'out-b-duty-2', top: '336px', left: '516px' },
                { id: 'out-b-duty-3', top: '366px', left: '516px' },
                { id: 'out-b-duty-4', top: '396px', left: '516px' },

                { id: 'out-sig-a', top: '437px', left: '202.5px' },
                { id: 'out-sig-b', top: '439px', left: '431.5px' }
            ];

            overlays.forEach(item => {
                const el = document.getElementById(item.id);
                if (!el.style.top || !el.style.top.includes('px')) {
                    el.style.top = item.top;
                    el.style.left = item.left;
                }
                makeDraggable(el);
            });
        }

        function makeDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            elmnt.onmousedown = dragMouseDown;
            elmnt.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                if (e.target !== elmnt) return; 
                if (e.cancelable) e.preventDefault(); 
                if (e.type === 'touchstart') {
                    pos3 = e.touches[0].clientX;
                    pos4 = e.touches[0].clientY;
                } else {
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                }
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                if (e.cancelable) e.preventDefault();
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        function getCoordinates() {
            let report = "🎯 請將以下完美座標複製給開發者：\n\n";
            document.querySelectorAll('.text-overlay, .sig-overlay').forEach(el => {
                report += `[${el.id}] -> top: '${el.style.top}', left: '${el.style.left}'\n`;
            });
            alert(report);
        }

        function exportPDF() {
            const element = document.getElementById('export-wrapper');
            
            const rawDate = document.getElementById('in-header-date').value;
            const dateStr = rawDate ? rawDate.replace(/-/g, '') : '';
            const crewAName = document.getElementById('in-a-name').value.trim() || '未具名';
            const dynamicFileName = `${dateStr}${crewAName}換班單.pdf`;
            
            const opt = {
                margin: 0,
                filename: dynamicFileName,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, scrollY: 0, scrollX: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
